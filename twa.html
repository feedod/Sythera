<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#000000" />

    <link rel="preconnect" href="https://esm.sh" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://api.iconify.design" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        background: #000;
      }
      body {
        color: #f5f5f7;
        font-family:
          ui-rounded, "SF Pro Rounded", "Nunito", -apple-system, BlinkMacSystemFont,
          system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      [x-cloak] {
        display: none !important;
      }
      video {
        pointer-events: none;
      }
      video::-webkit-media-controls,
      video::-webkit-media-controls-enclosure,
      video::-webkit-media-controls-panel,
      video::-webkit-media-controls-play-button {
        display: none !important;
        -webkit-appearance: none !important;
        opacity: 0 !important;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .swiper,
      .swiper-wrapper,
      .swiper-slide {
        height: 100%;
        width: 100%;
      }
      .swiper-pagination {
        position: static;
        inset: auto;
        width: auto;
        margin: 0;
        line-height: 1;
        color: inherit;
      }
      dialog {
        position: fixed;
        inset: 0;
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100svh;
        max-width: 100vw;
        max-height: 100svh;
        border: 0;
        background: transparent;
        color: inherit;
        overflow: clip;
      }
      dialog::backdrop {
        background: rgba(0, 0, 0, 0.6);
        opacity: 0;
        transition: opacity 0.32s ease;
      }
      dialog.dialog-shown::backdrop {
        opacity: 1;
      }
      dialog.onboard::backdrop {
        background: transparent;
      }
      dialog.composer::backdrop {
        background: rgba(0, 0, 0, 0.7);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
      }
      .sheet-panel {
        translate: 0 100%;
        transition: translate 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .dialog-shown .sheet-panel {
        translate: 0 0;
      }
      .composer-panel {
        translate: 0 12px;
        opacity: 0;
        transition: translate 0.24s ease, opacity 0.24s ease;
      }
      .dialog-shown .composer-panel {
        translate: 0 0;
        opacity: 1;
      }
      .fade-panel {
        opacity: 0;
        transition: opacity 0.32s ease;
      }
      .dialog-shown .fade-panel {
        opacity: 1;
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "alpinejs": "https://esm.sh/alpinejs@3",
          "@alpinejs/focus": "https://esm.sh/@alpinejs/focus@3",
          "@alpinejs/persist": "https://esm.sh/@alpinejs/persist@3",

    </script>

    <style type="text/tailwindcss">

    <script type="module">
      import Alpine from "alpinejs";
      import focus from "@alpinejs/focus";
      import persist from "@alpinejs/persist";
      import intersect from "@alpinejs/intersect";
      import autoAnimate from "@marcreichel/alpine-auto-animate";
      import { createClient } from "@supabase/supabase-js";
      import Swiper from "swiper";
      import { Mousewheel, Keyboard, Pagination } from "swiper/modules";
      import confetti from "canvas-confetti";
      import "iconify-icon";
      import { format as timeago, register as registerLocale } from "timeago.js";
      import ru from "timeago.js/lib/lang/ru";
      import imageCompression from "browser-image-compression";
      import {
        init as initTelegram,
        miniApp,
        viewport,
        swipeBehavior,
        closingBehavior,
        backButton,
        cloudStorage,
        hapticFeedback,
        shareURL,
        openTelegramLink,
        downloadFile,
        popup,
        requestWriteAccess,
        retrieveLaunchParams,
        retrieveRawInitData,
        shareStory,
      } from "@telegram-apps/sdk";

      registerLocale("ru", ru);

      Alpine.plugin(focus);
      Alpine.plugin(persist);
      Alpine.plugin(intersect);
      Alpine.plugin(autoAnimate);

      const HEART = confetti.shapeFromText({ text: "❤️", scalar: 2.4 });
      const heartBurst = (e) => {
        confetti({
          particleCount: 24,
          spread: 64,
          startVelocity: 26,
          gravity: 0.9,
          decay: 0.92,
          ticks: 110,
          scalar: 1.4,
          flat: true,
          shapes: [HEART],
          origin: {
            x: e ? e.clientX / window.innerWidth : 0.5,
            y: e ? e.clientY / window.innerHeight : 0.55,
          },
          disableForReducedMotion: true,
        });
      };

      const CONFIG = {
        SUPABASE_URL: "https://ljzbyeulrttcrphdxyaf.supabase.co",
        SUPABASE_KEY: "sb_publishable_cYwx_MbDt32sXHTlHKZUuQ_OuvB9dem",
        BOT_USERNAME: "SytheraBot",
      };

      const REACTIONS = ["❤️", "🔥", "😂", "😮", "🥹"];
      const SIGNED_TTL = 3600;
      const UPLOAD_MAX_PX = 1080;
      const CAPTION_MAX = 80;
      const REPLY_MAX = 200;
      const PAGE = 18;
      const LOAD_AHEAD = 3;

      const PR = new Intl.PluralRules("ru");
      const FRIEND_WORDS = { one: "друг", few: "друга", many: "друзей", other: "друзей" };
      const MOMENT_SELECT =
        "id, caption, image_path, created_at, author:profiles!moments_author_id_fkey(id, first_name, username, photo_url), reactions(emoji, user_id)";

      const tg = (fn) => {
        try {
          return fn();
        } catch {
          return undefined;
        }
      };
      const uuid = () => crypto.randomUUID();
      const clean = (text, max) =>
        String(text ?? "")
          .replace(/[\u0000-\u001F\u007F\u200B-\u200D\u2060\uFEFF]/g, "")
          .replace(/\s+/g, " ")
          .trim()
          .slice(0, max);
      const ago = (ts) => timeago(ts, "ru");

      const haptic = {
        impact: (style = "light") => tg(() => hapticFeedback.impactOccurred(style)),
        notify: (type = "success") => tg(() => hapticFeedback.notificationOccurred(type)),
        select: () => tg(() => hapticFeedback.selectionChanged()),
      };

      const toAuthor = (p) =>
        p && {
          id: p.id,
          name: p.first_name || (p.username ? `@${p.username}` : "Без имени"),
          username: p.username || null,
          photoUrl: p.photo_url,
        };

      Alpine.data("app", () => ({
        status: "loading",
        error: "",
        supabase: null,
        token: null,
        me: { id: null, name: "", username: null, photoUrl: null, notify: false },
        startParam: null,
        activeIndex: 0,
        screen: "camera",
        friendsOpen: false,
        captured: null,
        sending: false,
        moments: [],
        friends: [],
        blocked: [],
        feedLimit: PAGE,
        feedHasMore: false,
        momentsTotal: 0,
        loadingMore: false,
        showOnboarding: false,
        stream: null,
        facing: Alpine.$persist("user").as("sythera-facing"),
        torch: false,
        torchSupported: false,
        camStatus: "starting",
        lastTap: 0,
        lastTapId: null,
        channel: null,
        swiper: null,
        seenAt: null,
        composer: { open: false, kind: null, moment: null, value: "", placeholder: "", max: 0, withReactions: false },
        _starting: false,

        async init() {
          await this.boot();
          try {
            const { rawInitData, startParam } = this.launchContext();
            this.startParam = startParam;
            const session = await this.authenticate(rawInitData, startParam);
            this.token = session.token;
            this.me = session.user;
            this.supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY, {
              accessToken: async () => this.token,
            });
            await this.supabase.realtime.setAuth();
            this.status = "ready";
            await this.loadSeen();
            await this.loadBlocked();
            await Promise.all([this.loadFeed(), this.loadFriends()]);
            this.subscribe();
            await this.$nextTick();
            this.initSwiper();
            this.watchChrome();
            await this.handleStart();
            if (this.screen === "camera") await this.startCamera();
            this.syncChrome();
            await this.maybeOnboard();
            if (!this.showOnboarding) this.syncWriteAccess();
          } catch (e) {
            this.error = String(e?.message ?? e);
            this.status = "error";
          }
        },

        destroy() {
          this.stopCamera();
          this.clearCaptured();
          this.swiper?.destroy(true, true);
          this.swiper = null;
          if (this.channel) tg(() => this.supabase?.removeChannel(this.channel));
          this.channel = null;
        },

        launchContext() {
          const lp = retrieveLaunchParams();
          return {
            rawInitData: retrieveRawInitData() ?? lp.tgWebAppData ?? "",
            startParam: lp.tgWebAppStartParam,
          };
        },

        async authenticate(initData, startParam) {
          const anon = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
          const { data, error } = await anon.functions.invoke("auth", {
            body: { initData, startParam },
          });
          if (error) {
            const message = (await error.context?.json().catch(() => null))?.error;
            throw new Error(message || "Не удалось войти");
          }
          return data;
        },

        async boot() {
          if (this._booted) return;
          this._booted = true;
          tg(() => initTelegram());
          tg(() => {
            if (!miniApp.mount.isAvailable()) return;
            miniApp.mount();
            if (miniApp.setHeaderColor.isAvailable()) miniApp.setHeaderColor("#000000");
            if (miniApp.setBackgroundColor.isAvailable()) miniApp.setBackgroundColor("#000000");
            if (miniApp.setBottomBarColor.isAvailable()) miniApp.setBottomBarColor("#000000");
          });
          if (tg(() => viewport.mount.isAvailable())) {
            await tg(() => viewport.mount());
            tg(() => viewport.expand.isAvailable() && viewport.expand());
            await tg(
              () => viewport.requestFullscreen.isAvailable() && viewport.requestFullscreen(),
            );
            this.bindSafeArea();
          }
          tg(() => {
            if (!swipeBehavior.mount.isAvailable()) return;
            swipeBehavior.mount();
            if (swipeBehavior.disableVertical.isAvailable()) swipeBehavior.disableVertical();
          });
          tg(() => closingBehavior.mount.isAvailable() && closingBehavior.mount());
          tg(() => {
            if (!backButton.mount.isAvailable()) return;
            backButton.mount();
            if (backButton.onClick.isAvailable()) backButton.onClick(() => this.onBack());
          });
        },

        bindSafeArea() {
          const root = document.documentElement.style;
          const apply = () => {
            const s = tg(() => viewport.safeAreaInsets()) ?? {};
            const c = tg(() => viewport.contentSafeAreaInsets()) ?? {};
            const px = (a, b) => `${(a ?? 0) + (b ?? 0)}px`;
            root.setProperty("--safe-top", px(s.top, c.top));
            root.setProperty("--safe-bottom", px(s.bottom, c.bottom));
            root.setProperty("--safe-left", px(s.left, c.left));
            root.setProperty("--safe-right", px(s.right, c.right));
            root.setProperty("--sa-top", `${s.top ?? 0}px`);
            root.setProperty("--csa-top", `${c.top ?? 0}px`);
          };
          apply();
          tg(() => viewport.safeAreaInsets.sub(apply));
          tg(() => viewport.contentSafeAreaInsets.sub(apply));
        },

        onBack() {
          if (this.composer.open) return this.closeComposer();
          if (this.friendsOpen) return this.closeFriends();
          if (this.captured) return this.retake();
          if (this.screen === "feed") return this.toCamera();
        },
        syncBack() {
          tg(() => {
            const visible =
              this.composer.open || this.friendsOpen || !!this.captured || this.screen === "feed";
            if (visible && backButton.show.isAvailable()) backButton.show();
            else if (backButton.hide.isAvailable()) backButton.hide();
          });
        },
        syncChrome() {
          tg(() => {
            if (!closingBehavior.enableConfirmation.isAvailable()) return;
            this.captured
              ? closingBehavior.enableConfirmation()
              : closingBehavior.disableConfirmation();
          });
        },

        parseStart(param) {
          if (!param) return null;
          if (param.startsWith("m_")) return { type: "moment", id: param.slice(2) };
          if (param.startsWith("u_")) return { type: "user", id: param.slice(2) };
          return { type: "user", id: param };
        },
        async handleStart() {
          const ctx = this.parseStart(this.startParam);
          if (!ctx) return;
          if (ctx.type === "moment") {
            await this.openMoment(ctx.id);
          } else if (ctx.type === "user" && ctx.id !== this.me.id) {
            await this.loadFriends();
            if (this.friends.some((f) => f.id === ctx.id)) this.notify("Друг добавлен");
          }
        },
        async openMoment(id) {
          let idx = this.moments.findIndex((m) => m.id === id);
          if (idx === -1) {
            await this.fetchMoment(id);
            idx = this.moments.findIndex((m) => m.id === id);
          }
          if (idx === -1) return this.notify("Момент недоступен");
          await this.$nextTick();
          this.swiper?.update();
          this.swiper?.slideTo(idx + 1);
        },
        async fetchMoment(id) {
          const { data } = await this.supabase
            .from("moments")
            .select(MOMENT_SELECT)
            .eq("id", id)
            .maybeSingle();
          if (!data || this.moments.some((m) => m.id === id)) return;
          const [url] = await this.signUrls([data.image_path]);
          this.moments = [this.buildMoment(data, null, url), ...this.moments];
          await this.$nextTick();
          this.swiper?.update();
        },

        initSwiper() {
          const el = this.$refs.swiper;
          if (!el) return;
          this.swiper?.destroy(true, true);
          this.swiper = new Swiper(el, {
            modules: [Mousewheel, Keyboard, Pagination],
            direction: "vertical",
            speed: 360,
            threshold: 6,
            resistanceRatio: 0.65,
            observer: true,
            observeParents: true,
            mousewheel: { thresholdDelta: 8 },
            keyboard: { enabled: true },
            pagination: {
              el: this.$refs.pagination,
              type: "fraction",
              formatFractionCurrent: (n) => Math.max(1, n - 1),
              formatFractionTotal: () => Math.max(1, this.momentsTotal),
            },
            on: { slideChange: () => this.onSlide() },
          });
          this.lockSwipe();
        },
        onSlide() {
          const idx = this.swiper?.activeIndex ?? 0;
          if (idx !== this.activeIndex) {
            this.activeIndex = idx;
            haptic.select();
          }
          const next = idx === 0 ? "camera" : "feed";
          if (next !== this.screen) {
            this.screen = next;
            next === "feed" ? this.stopCamera() : this.startCamera();
          }
        },
        onMomentVisible(m) {
          this.markSeen(m);
          if (this.moments.indexOf(m) >= this.moments.length - LOAD_AHEAD) this.loadMore();
        },
        lockSwipe() {
          if (!this.swiper) return;
          const locked = !!this.captured || this.friendsOpen || this.composer.open;
          this.swiper.allowTouchMove = !locked;
          locked ? this.swiper.mousewheel?.disable() : this.swiper.mousewheel?.enable();
        },
        watchChrome() {
          this.$watch("captured", () => {
            this.syncBack();
            this.lockSwipe();
          });
          this.$watch("screen", () => this.syncBack());
          this.$watch("friendsOpen", (open) => {
            this.syncBack();
            this.lockSwipe();
            this.toggleDialog("friendsDialog", open);
          });
          this.$watch("showOnboarding", (open) => this.toggleDialog("onboardDialog", open));
          this.syncBack();
        },
        toggleDialog(ref, open) {
          const d = this.$refs[ref];
          if (!d) return;
          clearTimeout(d._closeTimer);
          if (open) {
            if (!d.open) tg(() => d.showModal());
            void d.offsetWidth;
            d.classList.add("dialog-shown");
          } else {
            d.classList.remove("dialog-shown");
            d._closeTimer = setTimeout(() => d.open && tg(() => d.close()), 360);
          }
        },
        toCamera() {
          if (this.captured) return;
          this.swiper?.slideTo(0);
        },
        toFeed() {
          if (this.captured) return;
          this.swiper?.slideTo(1);
        },

        openFriends() {
          haptic.select();
          this.friendsOpen = true;
        },
        closeFriends() {
          this.friendsOpen = false;
        },

        openReply(moment) {
          this.openComposer({
            kind: "reply",
            moment,
            value: moment.reply ?? "",
            placeholder: `Сообщение для ${moment.author?.name ?? ""}`.trim(),
            max: REPLY_MAX,
            withReactions: true,
          });
        },
        openCaption() {
          this.openComposer({
            kind: "caption",
            value: this.captured?.caption ?? "",
            placeholder: "Добавьте подпись",
            max: CAPTION_MAX,
          });
        },
        openEditCaption(moment) {
          this.openComposer({
            kind: "editCaption",
            moment,
            value: moment.caption ?? "",
            placeholder: "Подпись",
            max: CAPTION_MAX,
          });
        },
        openComposer(opts) {
          haptic.select();
          this.composer = {
            open: true,
            kind: opts.kind,
            moment: opts.moment ?? null,
            value: opts.value ?? "",
            placeholder: opts.placeholder ?? "",
            max: opts.max ?? REPLY_MAX,
            withReactions: !!opts.withReactions,
          };
          this.lockSwipe();
          this.syncBack();
          const d = this.$refs.composerDialog;
          if (!d) return;
          if (!d.open) tg(() => d.showModal());
          d.classList.add("dialog-shown");
          this.$refs.composerInput?.focus();
        },
        commitComposer(submit) {
          const c = this.composer;
          if (c.kind === "reply" && c.moment) {
            c.moment.reply = c.value;
            if (submit) this.sendReply(c.moment);
          } else if (c.kind === "caption" && this.captured) {
            this.captured.caption = clean(c.value, CAPTION_MAX);
          } else if (c.kind === "editCaption" && c.moment) {
            this.saveCaption(c.moment, c.value);
          }
          this.dismissComposer();
        },
        submitComposer() {
          this.commitComposer(true);
        },
        closeComposer() {
          this.commitComposer(false);
        },
        dismissComposer() {
          this.composer.open = false;
          this.composer.moment = null;
          const d = this.$refs.composerDialog;
          if (d) {
            d.classList.remove("dialog-shown");
            tg(() => d.open && d.close());
          }
          this.lockSwipe();
          this.syncBack();
        },

        buildMoment(m, was, url) {
          const reactions = {};
          let reacted = null;
          for (const r of m.reactions ?? []) {
            reactions[r.emoji] = (reactions[r.emoji] ?? 0) + 1;
            if (r.user_id === this.me.id) reacted = r.emoji;
          }
          const keepReact = was?._reactBusy;
          return {
            id: m.id,
            caption: m.caption,
            path: m.image_path,
            url: was?.url ?? url ?? null,
            loaded: was?.loaded ?? false,
            createdAt: m.created_at,
            author: toAuthor(m.author),
            mine: m.author?.id === this.me.id,
            reactions: keepReact ? was.reactions : reactions,
            reacted: keepReact ? was.reacted : reacted,
            _reactBusy: was?._reactBusy ?? false,
            reply: was?.reply ?? "",
          };
        },

        async loadFeed() {
          const { data, error, count } = await this.supabase
            .from("moments")
            .select(MOMENT_SELECT, { count: "exact" })
            .order("created_at", { ascending: false })
            .limit(this.feedLimit);
          if (error) return;
          this.momentsTotal = count ?? data.length;
          this.feedHasMore = data.length < this.momentsTotal;
          const prev = new Map(this.moments.map((m) => [m.id, m]));
          const fresh = data.filter((m) => !prev.get(m.id)?.url);
          const signed = await this.signUrls(fresh.map((m) => m.image_path));
          const signMap = new Map(fresh.map((m, i) => [m.id, signed[i]]));
          this.moments = data.map((m) => this.buildMoment(m, prev.get(m.id), signMap.get(m.id)));
          this.$nextTick(() => this.swiper?.update());
        },
        async countMoments() {
          const { count } = await this.supabase
            .from("moments")
            .select("id", { count: "exact", head: true });
          if (count != null) this.momentsTotal = count;
        },

        async reSign(m) {
          if (m._resigning || (m._reTries ?? 0) >= 2) return;
          m._resigning = true;
          m._reTries = (m._reTries ?? 0) + 1;
          const [url] = await this.signUrls([m.path]);
          m._resigning = false;
          if (url) {
            m.loaded = false;
            m.url = url;
          }
        },

        async loadMore() {
          if (this.loadingMore || !this.feedHasMore) return;
          this.loadingMore = true;
          this.feedLimit += PAGE;
          await this.loadFeed();
          this.loadingMore = false;
        },

        async signUrls(paths) {
          if (!paths.length) return [];
          const { data } = await this.supabase.storage
            .from("moments")
            .createSignedUrls(paths, SIGNED_TTL);
          return (data ?? []).map((d) => d?.signedUrl ?? null);
        },
        async signedUrl(moment) {
          const [url] = await this.signUrls([moment.path]);
          return url ?? moment.url;
        },

        async loadBlocked() {
          const { data } = await this.supabase
            .from("blocks")
            .select("blocked:profiles!blocks_blocked_id_fkey(id, first_name, username, photo_url)")
            .eq("blocker_id", this.me.id);
          this.blocked = (data ?? []).map((b) => toAuthor(b.blocked)).filter(Boolean);
        },

        async loadFriends() {
          const { data } = await this.supabase
            .from("friendships")
            .select("friend:profiles!friendships_friend_id_fkey(id, first_name, username, photo_url)")
            .eq("user_id", this.me.id);
          this.friends = (data ?? []).map((f) => toAuthor(f.friend)).filter(Boolean);
        },

        subscribe() {
          if (this.channel) tg(() => this.supabase.removeChannel(this.channel));
          this.channel = this.supabase
            .channel("sythera")
            .on(
              "postgres_changes",
              { event: "INSERT", schema: "public", table: "moments" },
              () => {
                haptic.notify("success");
                this.scheduleFeedReload();
              },
            )
            .on(
              "postgres_changes",
              { event: "*", schema: "public", table: "reactions" },
              () => this.scheduleFeedReload(),
            )
            .subscribe();
        },
        scheduleFeedReload() {
          clearTimeout(this._feedTimer);
          this._feedTimer = setTimeout(() => this.loadFeed(), 250);
        },

        async loadSeen() {
          if (!cloudStorage.getItem.isAvailable()) return;
          this.seenAt = (await cloudStorage.getItem("seenAt").catch(() => null)) || null;
        },
        isUnseen(m) {
          if (!m || m.mine) return false;
          if (this.seenAt && m.createdAt <= this.seenAt) return false;
          return true;
        },
        markSeen(m) {
          if (!m || m.mine) return;
          if (!this.seenAt || m.createdAt > this.seenAt) {
            this.seenAt = m.createdAt;
            this.persistSeen();
          }
        },
        persistSeen() {
          clearTimeout(this._seenTimer);
          this._seenTimer = setTimeout(
            () =>
              cloudStorage.setItem.isAvailable() &&
              tg(() => cloudStorage.setItem("seenAt", this.seenAt || "")),
            400,
          );
        },

        videoTrack() {
          return this.stream?.getVideoTracks()[0] ?? null;
        },

        async startCamera() {
          if (this.screen !== "camera" || this.captured || this.stream || this._starting) return;
          this._starting = true;
          this.camStatus = "starting";
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: {
                facingMode: this.facing,
                width: { ideal: 1440 },
                height: { ideal: 1440 },
              },
              audio: false,
            });
            if (this.screen !== "camera" || this.captured) {
              stream.getTracks().forEach((t) => t.stop());
              return;
            }
            this.stream = stream;
            await this.$nextTick();
            const v = this.$refs.video;
            if (v) {
              v.muted = true;
              v.defaultMuted = true;
              v.playsInline = true;
              v.srcObject = this.stream;
              await v.play().catch(() => {});
              this.camStatus = "live";
            }
            this.refreshTorch();
          } catch {
            this.camStatus = "denied";
          } finally {
            this._starting = false;
          }
        },
        stopCamera() {
          this.disableTorch();
          this.stream?.getTracks().forEach((t) => t.stop());
          this.stream = null;
          if (this.camStatus === "live") this.camStatus = "idle";
          const v = this.$refs.video;
          if (v) v.srcObject = null;
        },
        async flipCamera() {
          haptic.impact();
          this.facing = this.facing === "user" ? "environment" : "user";
          this.stopCamera();
          await this.startCamera();
        },
        refreshTorch() {
          this.torchSupported = !!tg(() => this.videoTrack()?.getCapabilities?.().torch);
          if (!this.torchSupported) this.torch = false;
        },
        async toggleTorch() {
          if (!this.torchSupported) return this.notify("Вспышка недоступна");
          const track = this.videoTrack();
          if (!track) return;
          const next = !this.torch;
          try {
            await track.applyConstraints({ advanced: [{ torch: next }] });
            this.torch = next;
            haptic.impact();
          } catch {
            this.torch = false;
            this.notify("Не удалось включить вспышку");
          }
        },
        disableTorch() {
          if (!this.torch) return;
          tg(() => this.videoTrack()?.applyConstraints({ advanced: [{ torch: false }] }));
          this.torch = false;
        },

        async capture() {
          const v = this.$refs.video;
          if (!v || !this.stream) return;
          haptic.impact("medium");
          const size = Math.min(v.videoWidth, v.videoHeight);
          const canvas = document.createElement("canvas");
          canvas.width = canvas.height = size;
          const ctx = canvas.getContext("2d");
          if (this.facing === "user") {
            ctx.translate(size, 0);
            ctx.scale(-1, 1);
          }
          ctx.drawImage(
            v,
            (v.videoWidth - size) / 2,
            (v.videoHeight - size) / 2,
            size,
            size,
            0,
            0,
            size,
            size,
          );
          const blob = await new Promise((res) => canvas.toBlob(res, "image/jpeg", 0.92));
          this.captured = { blob, url: URL.createObjectURL(blob), caption: "" };
          this.stopCamera();
          this.syncChrome();
        },
        clearCaptured() {
          if (this.captured?.url) URL.revokeObjectURL(this.captured.url);
          this.captured = null;
        },
        retake() {
          this.clearCaptured();
          this.startCamera();
          this.syncChrome();
        },

        async send() {
          if (!this.captured || this.sending) return;
          this.sending = true;
          this.syncChrome();
          try {
            const blob = await imageCompression(this.captured.blob, {
              maxWidthOrHeight: UPLOAD_MAX_PX,
              maxSizeMB: 0.6,
              initialQuality: 0.85,
              fileType: "image/jpeg",
              useWebWorker: true,
            });
            const path = `${this.me.id}/${uuid()}.jpg`;
            const up = await this.supabase.storage
              .from("moments")
              .upload(path, blob, { contentType: "image/jpeg" });
            if (up.error) throw up.error;
            const ins = await this.supabase.from("moments").insert({
              author_id: this.me.id,
              image_path: path,
              caption: clean(this.captured.caption, CAPTION_MAX) || null,
            });
            if (ins.error) throw ins.error;
            haptic.notify("success");
            this.clearCaptured();
            this.syncChrome();
            await this.loadFeed();
            this.toFeed();
            this.notify("Опубликовано");
          } catch {
            haptic.notify("error");
            this.notify("Не удалось опубликовать");
          } finally {
            this.sending = false;
            this.syncChrome();
          }
        },

        async remove(moment) {
          if (!(await this.confirm("Удалить момент?", "Это действие нельзя отменить."))) return;
          const idx = this.moments.findIndex((m) => m.id === moment.id);
          const { error } = await this.supabase.from("moments").delete().eq("id", moment.id);
          if (error) return this.notify("Не удалось удалить");
          tg(() => this.supabase.storage.from("moments").remove([moment.path]));
          haptic.notify("warning");
          this.momentsTotal = Math.max(0, this.momentsTotal - 1);
          this.moments = this.moments.filter((m) => m.id !== moment.id);
          await this.$nextTick();
          this.swiper?.update();
          if (!this.moments.length) return this.toCamera();
          this.swiper?.slideTo(Math.min(Math.max(1, idx), this.moments.length));
        },

        async saveCaption(moment, raw) {
          const caption = clean(raw, CAPTION_MAX) || null;
          if (caption === (moment.caption ?? null)) return;
          const { error } = await this.supabase
            .from("moments")
            .update({ caption })
            .eq("id", moment.id);
          if (error) return this.notify("Не удалось сохранить");
          moment.caption = caption;
          haptic.notify("success");
        },

        shareToChat(moment) {
          haptic.impact();
          if (!shareURL.isAvailable()) return this.notify("Недоступно в этой версии Telegram");
          const link = `https://t.me/${CONFIG.BOT_USERNAME}?startapp=m_${moment.id}`;
          const text = moment.mine
            ? moment.caption
              ? `${moment.caption} — мой момент в Sythera`
              : "Мой момент в Sythera"
            : "Момент в Sythera";
          tg(() => shareURL(link, text));
        },
        async shareToStory(moment) {
          haptic.impact();
          if (!moment.mine) return this.notify("В историю можно добавить только свой момент");
          if (!moment.path) return this.notify("Момент ещё загружается");
          if (!shareStory.isAvailable()) return this.notify("Недоступно в этой версии Telegram");
          const url = await this.signedUrl(moment);
          if (!url) return this.notify("Момент ещё загружается");
          tg(() =>
            shareStory(url, {
              text: moment.caption || undefined,
              widgetLink: {
                url: `https://t.me/${CONFIG.BOT_USERNAME}?startapp=u_${this.me.id}`,
                name: "Sythera",
              },
            }),
          );
        },

        async block(moment) {
          const author = moment.author;
          if (!author || author.id === this.me.id) return;
          if (
            !(await this.confirm(
              "Заблокировать?",
              `Вы больше не увидите моменты ${author.name}.`,
              "Заблокировать",
            ))
          )
            return;
          const { error } = await this.supabase
            .from("blocks")
            .upsert(
              { blocker_id: this.me.id, blocked_id: author.id },
              { onConflict: "blocker_id,blocked_id" },
            );
          if (error) return this.notify("Не удалось заблокировать");
          haptic.notify("warning");
          this.blocked = [...this.blocked.filter((b) => b.id !== author.id), author];
          this.moments = this.moments.filter((m) => m.author?.id !== author.id);
          this.countMoments();
        },
        async unblock(user) {
          const { error } = await this.supabase
            .from("blocks")
            .delete()
            .eq("blocker_id", this.me.id)
            .eq("blocked_id", user.id);
          if (error) return this.notify("Не удалось разблокировать");
          haptic.select();
          this.blocked = this.blocked.filter((b) => b.id !== user.id);
          this.loadFeed();
        },

        async maybeOnboard() {
          let seen;
          if (cloudStorage.getItem.isAvailable())
            seen = await cloudStorage.getItem("onboarded").catch(() => null);
          this.showOnboarding = !seen;
        },
        finishOnboarding() {
          haptic.impact();
          this.showOnboarding = false;
          if (cloudStorage.setItem.isAvailable())
            cloudStorage.setItem("onboarded", "1").catch(() => {});
          this.syncWriteAccess();
        },

        async react(moment, emoji) {
          if (moment._reactBusy) return;
          haptic.impact();
          const prev = { reacted: moment.reacted, counts: { ...moment.reactions } };
          const next = moment.reacted === emoji ? null : emoji;
          if (moment.reacted)
            moment.reactions[moment.reacted] = Math.max(0, (moment.reactions[moment.reacted] ?? 1) - 1);
          if (next) moment.reactions[next] = (moment.reactions[next] ?? 0) + 1;
          moment.reacted = next;
          moment._reactBusy = true;
          const { error } = next
            ? await this.supabase
                .from("reactions")
                .upsert(
                  { moment_id: moment.id, user_id: this.me.id, emoji: next },
                  { onConflict: "moment_id,user_id" },
                )
            : await this.supabase
                .from("reactions")
                .delete()
                .eq("moment_id", moment.id)
                .eq("user_id", this.me.id);
          moment._reactBusy = false;
          if (error) {
            moment.reacted = prev.reacted;
            moment.reactions = prev.counts;
            haptic.notify("error");
          }
        },

        onImageTap(moment, e) {
          if (moment.mine) return;
          const now = Date.now();
          const isDouble = now - this.lastTap < 300 && this.lastTapId === moment.id;
          if (isDouble) {
            this.lastTap = 0;
            this.lastTapId = null;
            if (moment.reacted !== "❤️") this.react(moment, "❤️");
            heartBurst(e);
            return;
          }
          this.lastTap = now;
          this.lastTapId = moment.id;
        },

        async sendReply(moment) {
          const text = clean(moment.reply, REPLY_MAX);
          if (!text) return;
          try {
            await this.supabase.functions.invoke("reply", {
              body: { momentId: moment.id, text },
            });
            moment.reply = "";
            haptic.notify("success");
            this.notify("Отправлено");
          } catch {
            haptic.notify("error");
            this.notify("Не удалось отправить");
          }
        },

        async ensureWriteAccess() {
          if (!requestWriteAccess.isAvailable()) return true;
          try {
            return (await requestWriteAccess()) === "allowed";
          } catch {
            return false;
          }
        },
        async syncWriteAccess() {
          if (!this.me.notify) return;
          if (await this.ensureWriteAccess()) return;
          await this.supabase.from("profiles").update({ notify: false }).eq("id", this.me.id);
          this.me = { ...this.me, notify: false };
        },
        async toggleNotify() {
          const next = !this.me.notify;
          if (next && !(await this.ensureWriteAccess())) {
            haptic.notify("error");
            return this.notify("Разрешите боту писать вам, чтобы получать уведомления");
          }
          const { error } = await this.supabase
            .from("profiles")
            .update({ notify: next })
            .eq("id", this.me.id);
          if (error) return this.notify("Не удалось сохранить");
          this.me = { ...this.me, notify: next };
          haptic.select();
        },

        invite() {
          haptic.impact();
          this.closeFriends();
          if (!shareURL.isAvailable()) return this.notify("Недоступно в этой версии Telegram");
          const link = `https://t.me/${CONFIG.BOT_USERNAME}?startapp=u_${this.me.id}`;
          tg(() => shareURL(link, "Присоединяйтесь ко мне в Sythera"));
        },

        openUserProfile(user) {
          haptic.impact();
          const username = user?.username;
          if (!username)
            return this.notify(
              user?.id === this.me.id
                ? "У вас не задано имя пользователя в Telegram"
                : "У этого пользователя нет имени пользователя",
            );
          if (!openTelegramLink.isAvailable())
            return this.notify("Недоступно в этой версии Telegram");
          tg(() => openTelegramLink(`https://t.me/${username}`));
        },

        async removeFriend(friend) {
          if (
            !(await this.confirm(
              "Удалить из друзей?",
              `${friend.name} больше не увидит ваши моменты.`,
            ))
          )
            return;
          const me = this.me.id;
          const { error } = await this.supabase
            .from("friendships")
            .delete()
            .or(
              `and(user_id.eq.${me},friend_id.eq.${friend.id}),and(user_id.eq.${friend.id},friend_id.eq.${me})`,
            );
          if (error) return this.notify("Не удалось удалить");
          haptic.notify("warning");
          this.friends = this.friends.filter((f) => f.id !== friend.id);
          this.loadFeed();
        },

        async save(moment) {
          if (!moment.mine) return this.notify("Сохранить можно только свой момент");
          haptic.impact();
          if (!downloadFile.isAvailable()) return this.notify("Недоступно в этой версии Telegram");
          try {
            const url = await this.signedUrl(moment);
            await downloadFile(url, `sythera-${moment.id}.jpg`);
            haptic.notify("success");
          } catch {
            this.notify("Не удалось сохранить");
          }
        },

        notify(text) {
          window.dispatchEvent(new CustomEvent("notify", { detail: { text } }));
        },
        async confirm(title, message, okText = "Удалить") {
          if (!popup.open.isAvailable()) return false;
          try {
            const id = await popup.open({
              title,
              message,
              buttons: [
                { id: "ok", type: "destructive", text: okText },
                { id: "cancel", type: "cancel" },
              ],
            });
            return id === "ok";
          } catch {
            return false;
          }
        },

        get friendsLabel() {
          const n = this.friends.length;
          return `${n} ${FRIEND_WORDS[PR.select(n)]}`;
        },
        get unseenCount() {
          let n = 0;
          for (const m of this.moments) if (this.isUnseen(m)) n++;
          return n;
        },
        ago,
        initials: (p) => (p?.name || "?").trim().charAt(0).toUpperCase(),
        reactionList: REACTIONS,
      }));

      Alpine.data("toasts", () => ({
        items: [],
        add(detail) {
          const id = Date.now() + Math.random();
          this.items.push({ id, text: detail.text });
          setTimeout(() => this.remove(id), 2600);
        },
        remove(id) {
          this.items = this.items.filter((t) => t.id !== id);
        },
      }));

      window.Alpine = Alpine;
      Alpine.start();
    </script>
  </head>

  <body x-data="app" class="h-svh overflow-hidden bg-bg font-sans text-fg">
    <div x-show="status === 'loading'" class="fixed inset-0 grid place-items-center">
      <p class="text-[2.75rem] font-black tracking-[-0.04em] text-fg motion-safe:animate-float">
        Sythera
      </p>
    </div>

    <div
      x-show="status === 'error'"
      x-cloak
      class="safe grid h-svh place-items-center px-8 text-center"
    >
      <div class="max-w-sm motion-safe:animate-rise">
        <h1 class="text-2xl font-bold tracking-tight">Что-то пошло не так</h1>
        <p class="mt-3 text-[15px] leading-relaxed text-muted" x-text="error"></p>
        <button
          @click="status = 'loading'; init()"
          class="mt-6 rounded-full bg-accent px-6 py-3 text-[15px] font-semibold text-on-accent transition active:scale-95"
        >
          Повторить
        </button>
      </div>
    </div>

    <div x-show="status === 'ready'" x-cloak class="fixed inset-x-0 top-0 h-dvh overflow-hidden">
      <div class="swiper" x-ref="swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <section class="flex h-full flex-col items-center justify-center gap-9">
              <div
                class="relative aspect-square w-full min-h-0 shrink overflow-hidden rounded-[2.75rem] bg-white/[0.04] shadow-[0_40px_90px_-30px_rgba(0,0,0,0.9)]"
              >
                <video
                  x-show="!captured && camStatus === 'live'"
                  x-ref="video"
                  playsinline
                  muted
                  disablepictureinpicture
                  @playing="stream && (camStatus = 'live')"
                  @loadedmetadata="$el.play().catch(() => {})"
                  @pause="stream && $el.play().catch(() => {})"
                  class="h-full w-full object-cover"
                  :class="facing === 'user' && '-scale-x-100'"
                ></video>

                <div
                  x-show="!captured && camStatus === 'starting'"
                  class="absolute inset-0 grid place-items-center"
                >
                  <span
                    class="size-8 rounded-full border-2 border-white/20 border-t-white/80 motion-safe:animate-spin-slow"
                  ></span>
                </div>

                <img
                  x-show="captured"
                  x-cloak
                  x-transition:enter="animate-shot"
                  :src="captured?.url"
                  alt=""
                  class="h-full w-full object-cover"
                />

                <template x-if="captured">
                  <button
                    @click="openCaption()"
                    class="glass-dark absolute inset-x-4 bottom-4 truncate rounded-full border border-white/15 px-5 py-3.5 text-center text-[15px] font-medium transition active:scale-[0.98]"
                    :class="captured.caption ? 'text-fg' : 'text-white/55'"
                    x-text="captured.caption || 'Добавьте подпись'"
                  ></button>
                </template>

                <div
                  x-show="!captured && camStatus === 'denied'"
                  x-cloak
                  class="absolute inset-0 grid place-items-center px-8 text-center"
                >
                  <div>
                    <div class="mx-auto mb-4 grid size-14 place-items-center rounded-full border border-white/10 bg-white/5">
                      <iconify-icon icon="lucide:camera-off" class="text-[1.75rem] text-muted"></iconify-icon>
                    </div>
                    <p class="text-[15px] font-semibold">Нет доступа к камере</p>
                    <p class="mt-1 text-sm text-muted">
                      Разрешите доступ к камере в настройках Telegram.
                    </p>
                  </div>
                </div>
              </div>

              <div x-show="!captured" class="flex w-full max-w-[340px] items-center justify-between">
                <div class="grid size-14 place-items-center">
                  <button
                    x-show="torchSupported"
                    @click="toggleTorch()"
                    aria-label="Вспышка"
                    class="grid size-14 place-items-center rounded-full transition active:scale-90"
                    :class="torch ? 'text-yellow-300' : 'text-white/70 active:text-fg'"
                  >
                    <iconify-icon icon="lucide:zap" class="text-[2rem]"></iconify-icon>
                  </button>
                </div>

                <button
                  @click="capture()"
                  :disabled="camStatus !== 'live'"
                  aria-label="Снимок"
                  class="grid size-[5.5rem] place-items-center rounded-full ring-[5px] ring-fg/85 transition active:scale-90 disabled:opacity-40"
                >
                  <span class="size-[4.4rem] rounded-full bg-fg transition active:scale-95"></span>
                </button>

                <button
                  @click="flipCamera()"
                  aria-label="Сменить камеру"
                  class="grid size-14 place-items-center rounded-full text-white/70 transition active:scale-90 active:text-fg"
                >
                  <iconify-icon icon="lucide:switch-camera" class="text-[2rem]"></iconify-icon>
                </button>
              </div>

              <div
                x-show="captured"
                x-cloak
                class="flex w-full max-w-[340px] items-center justify-between"
              >
                <button
                  @click="retake()"
                  aria-label="Переснять"
                  class="grid size-14 place-items-center rounded-full text-white/70 transition active:scale-90 active:text-fg"
                >
                  <iconify-icon icon="lucide:rotate-ccw" class="text-[2rem]"></iconify-icon>
                </button>

                <button
                  @click="send()"
                  :disabled="sending"
                  aria-label="Опубликовать"
                  class="grid size-[5.5rem] place-items-center rounded-full bg-accent text-on-accent shadow-[0_18px_40px_-12px_rgba(245,245,247,0.5)] transition active:scale-90 disabled:opacity-50"
                >
                  <iconify-icon x-show="!sending" icon="lucide:send" class="text-[2rem]"></iconify-icon>
                  <span
                    x-show="sending"
                    x-cloak
                    class="size-7 rounded-full border-2 border-on-accent/30 border-t-on-accent motion-safe:animate-spin-slow"
                  ></span>
                </button>

                <div class="size-14"></div>
              </div>
            </section>
          </div>

          <template x-if="!moments.length">
            <div class="swiper-slide">
              <div class="flex h-full flex-col items-center justify-center px-8 text-center">
                <div class="mx-auto max-w-xs motion-safe:animate-rise">
                  <div class="mx-auto mb-5 grid size-16 place-items-center rounded-[1.5rem] border border-white/10 bg-white/5">
                    <iconify-icon icon="lucide:image" class="text-[2rem] text-muted"></iconify-icon>
                  </div>
                  <p class="text-[17px] font-bold">Здесь появятся моменты</p>
                  <p class="mt-1.5 text-sm leading-relaxed text-muted">
                    Сделайте первый снимок, чтобы поделиться им с друзьями.
                  </p>
                </div>
              </div>
            </div>
          </template>

          <template x-for="m in moments" :key="m.id">
            <div class="swiper-slide">
              <div
                x-intersect.half="onMomentVisible(m)"
                class="flex h-full flex-col justify-center gap-4"
              >
                <div class="w-full motion-safe:animate-rise">
                  <div class="mb-3.5 flex items-center justify-center px-5">
                    <button
                      type="button"
                      @click="openUserProfile(m.author)"
                      class="flex min-w-0 items-center gap-2.5 transition active:scale-95"
                    >
                      <span
                        class="relative grid size-8 shrink-0 place-items-center overflow-hidden rounded-full border border-white/10 bg-white/10 text-xs font-bold text-fg"
                      >
                        <img
                          x-show="m.author.photoUrl"
                          :src="m.author.photoUrl"
                          @error="m.author.photoUrl = null"
                          alt=""
                          class="absolute inset-0 h-full w-full object-cover"
                        />
                        <span x-show="!m.author.photoUrl" x-text="initials(m.author)"></span>
                      </span>
                      <span class="min-w-0 truncate text-[15px] font-bold leading-tight" x-text="m.mine ? 'Вы' : m.author.name"></span>
                      <span class="shrink-0 text-xs text-muted" x-text="ago(m.createdAt)"></span>
                    </button>
                  </div>

                  <div
                    class="relative mx-5 aspect-square overflow-hidden rounded-[2.75rem] bg-white/5 shadow-[0_40px_90px_-30px_rgba(0,0,0,0.95)]"
                    @click="onImageTap(m, $event)"
                  >
                    <img
                      :src="m.url"
                      alt=""
                      loading="lazy"
                      decoding="async"
                      @load="m.loaded = true"
                      @error="reSign(m)"
                      class="h-full w-full object-cover transition-opacity duration-500 motion-reduce:transition-none"
                      :class="m.loaded ? 'opacity-100' : 'opacity-0'"
                    />
                    <p
                      x-show="m.caption"
                      class="glass-dark absolute inset-x-4 bottom-4 line-clamp-3 break-words rounded-2xl border border-white/15 px-4 py-2.5 text-center text-[15px] font-medium"
                      x-text="m.caption"
                    ></p>
                  </div>

                  <div x-show="!m.mine" class="mt-4 px-5">
                    <div class="glass flex items-center gap-1 rounded-full border border-white/10 p-1.5">
                      <button
                        @click="openReply(m)"
                        class="flex min-w-0 flex-1 items-center gap-2 rounded-full px-4 py-2.5 text-left text-[15px] transition active:scale-[0.98]"
                        :class="m.reply?.trim() ? 'text-fg' : 'text-muted'"
                      >
                        <iconify-icon icon="lucide:message-circle" class="text-[1.1rem] shrink-0"></iconify-icon>
                        <span class="truncate" x-text="m.reply?.trim() || 'Сообщение…'"></span>
                      </button>
                      <template x-for="e in reactionList" :key="e">
                        <button
                          @click="react(m, e)"
                          class="relative grid size-9 shrink-0 place-items-center rounded-full text-xl transition active:scale-90"
                          :class="m.reacted === e ? 'bg-white/15' : 'opacity-55 active:opacity-100'"
                        >
                          <span x-text="e"></span>
                          <span
                            x-show="m.reactions[e]"
                            class="absolute -right-1 -top-1 min-w-4 rounded-full bg-accent px-1 text-[10px] font-bold leading-4 text-on-accent tabular-nums"
                            x-text="m.reactions[e]"
                          ></span>
                        </button>
                      </template>
                    </div>
                  </div>

                  <div
                    x-show="m.mine && reactionList.some((e) => m.reactions[e])"
                    x-cloak
                    class="mt-4 flex justify-center"
                  >
                    <div class="glass flex items-center gap-0.5 rounded-full border border-white/10 px-2.5 py-1.5">
                      <template x-for="e in reactionList" :key="e">
                        <span x-show="m.reactions[e]" class="flex items-center gap-1 px-1.5 text-2xl">
                          <span x-text="e"></span>
                          <span class="text-sm font-bold tabular-nums text-muted" x-text="m.reactions[e]"></span>
                        </span>
                      </template>
                    </div>
                  </div>

                  <div class="mt-4 flex justify-center px-5">
                    <div class="glass flex items-center gap-1 rounded-full border border-white/10 p-1.5">
                      <button
                        @click="shareToChat(m)"
                        aria-label="Поделиться"
                        class="grid size-11 place-items-center rounded-full text-fg/70 transition active:scale-90 active:bg-white/10 active:text-fg"
                      >
                        <iconify-icon icon="lucide:send" class="text-[1.25rem]"></iconify-icon>
                      </button>
                      <template x-if="m.mine">
                        <div class="contents">
                          <button
                            @click="shareToStory(m)"
                            aria-label="Добавить в историю"
                            class="grid size-11 place-items-center rounded-full text-fg/70 transition active:scale-90 active:bg-white/10 active:text-fg"
                          >
                            <iconify-icon icon="lucide:circle-plus" class="text-[1.25rem]"></iconify-icon>
                          </button>
                          <button
                            @click="save(m)"
                            aria-label="Сохранить"
                            class="grid size-11 place-items-center rounded-full text-fg/70 transition active:scale-90 active:bg-white/10 active:text-fg"
                          >
                            <iconify-icon icon="lucide:download" class="text-[1.25rem]"></iconify-icon>
                          </button>
                          <button
                            @click="openEditCaption(m)"
                            aria-label="Изменить подпись"
                            class="grid size-11 place-items-center rounded-full text-fg/70 transition active:scale-90 active:bg-white/10 active:text-fg"
                          >
                            <iconify-icon icon="lucide:pencil" class="text-[1.25rem]"></iconify-icon>
                          </button>
                          <button
                            @click="remove(m)"
                            aria-label="Удалить"
                            class="grid size-11 place-items-center rounded-full text-danger transition active:scale-90 active:bg-danger/15"
                          >
                            <iconify-icon icon="lucide:trash-2" class="text-[1.25rem]"></iconify-icon>
                          </button>
                        </div>
                      </template>
                      <template x-if="!m.mine">
                        <button
                          @click="block(m)"
                          aria-label="Заблокировать"
                          class="grid size-11 place-items-center rounded-full text-danger transition active:scale-90 active:bg-danger/15"
                        >
                          <iconify-icon icon="lucide:user-x" class="text-[1.25rem]"></iconify-icon>
                        </button>
                      </template>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <div
        x-show="screen === 'feed' && moments.length"
        x-cloak
        class="safe-t pointer-events-none absolute inset-x-0 top-0 z-20 flex justify-center px-4"
      >
        <div class="glass mt-2 rounded-full border border-white/10 px-3.5 py-1 text-[13px] font-bold tabular-nums text-fg/90">
          <div class="swiper-pagination" x-ref="pagination"></div>
        </div>
      </div>

      <header
        x-show="screen === 'camera' && !captured"
        class="safe-t pointer-events-none absolute inset-x-0 top-0 z-20 flex flex-col items-center gap-3 px-4"
      >
        <div class="h-2"></div>
        <button
          @click="openFriends()"
          class="glass pointer-events-auto flex max-w-[80vw] items-center gap-2.5 rounded-full border border-white/10 py-1.5 pl-1.5 pr-4 transition active:scale-95"
        >
          <span
            class="relative grid size-8 shrink-0 place-items-center overflow-hidden rounded-full border border-white/10 bg-white/10 text-xs font-bold text-fg"
          >
            <img
              x-show="me.photoUrl"
              :src="me.photoUrl"
              @error="me.photoUrl = null"
              alt=""
              class="absolute inset-0 h-full w-full object-cover"
            />
            <span x-show="!me.photoUrl" x-text="initials(me)"></span>
          </span>
          <span class="truncate text-[15px] font-bold" x-text="friendsLabel"></span>
          <iconify-icon icon="lucide:chevron-down" class="text-[1rem] shrink-0 text-muted"></iconify-icon>
        </button>
      </header>

      <div
        x-show="screen === 'camera' && !captured"
        class="safe-b pointer-events-none absolute inset-x-0 bottom-0 z-20 flex justify-center pb-4"
      >
        <button
          @click="toFeed()"
          class="pointer-events-auto flex flex-col items-center gap-1.5 transition active:scale-90"
          :class="unseenCount ? 'text-fg' : 'text-white/55'"
        >
          <span
            x-show="unseenCount"
            x-cloak
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 scale-50"
            x-transition:enter-end="opacity-100 scale-100"
            class="grid h-7 min-w-7 place-items-center rounded-full bg-accent px-2 text-[13px] font-black tabular-nums text-on-accent shadow-lg shadow-black/40 motion-safe:animate-rise"
            x-text="unseenCount > 99 ? '99+' : unseenCount"
          ></span>
          <span
            class="text-[13px] font-bold uppercase tracking-wide"
            x-text="unseenCount ? (unseenCount === 1 ? 'Новый момент' : 'Новые моменты') : 'Моменты'"
          ></span>
          <iconify-icon icon="lucide:chevron-down" class="text-[1.25rem] motion-safe:animate-bounce"></iconify-icon>
        </button>
      </div>

      <div
        x-show="screen === 'feed' && !captured"
        x-cloak
        class="pointer-events-none absolute inset-x-0 z-20 flex items-center justify-center"
        style="top: var(--sa-top, env(safe-area-inset-top)); height: max(var(--csa-top, 0px), 3rem)"
      >
        <button
          @click="toCamera()"
          class="pointer-events-auto flex flex-col items-center gap-1 text-white/60 transition active:scale-90"
          aria-label="К камере"
        >
          <iconify-icon icon="lucide:chevron-up" class="text-[1.25rem] motion-safe:animate-bounce"></iconify-icon>
          <span class="text-[12px] font-bold uppercase tracking-wide">Камера</span>
        </button>
      </div>
    </div>

    <dialog
      x-ref="composerDialog"
      class="composer"
      @cancel.prevent="closeComposer()"
      @close="composer.open = false"
      @click="$event.target === $el && closeComposer()"
      aria-label="Сообщение"
    >
      <div class="composer-panel safe-b safe-x absolute inset-x-0 bottom-0 px-4 pt-3 pb-3">
        <div class="mx-auto max-w-[480px]">
          <div x-show="composer.withReactions" class="mb-3 flex justify-center">
            <div class="glass flex items-center gap-1 rounded-full border border-white/10 p-1.5">
              <template x-for="e in reactionList" :key="e">
                <button
                  @click="composer.moment && react(composer.moment, e)"
                  class="grid size-11 place-items-center rounded-full text-2xl transition active:scale-90"
                  :class="composer.moment && composer.moment.reacted === e ? 'bg-white/15' : 'opacity-70 active:opacity-100'"
                >
                  <span x-text="e"></span>
                </button>
              </template>
            </div>
          </div>

          <div class="flex items-center gap-2">
            <div class="relative min-w-0 flex-1">
              <input
                x-ref="composerInput"
                x-model="composer.value"
                :maxlength="composer.max"
                :placeholder="composer.placeholder"
                enterkeyhint="send"
                @keydown.enter.prevent="submitComposer()"
                class="glass w-full rounded-full border border-white/10 py-3.5 pl-5 pr-14 text-[15px] text-fg placeholder:text-muted focus:outline-none"
              />
              <span
                x-show="composer.value.length"
                class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-[11px] tabular-nums text-muted"
                x-text="composer.value.length + '/' + composer.max"
              ></span>
            </div>
            <button
              @click="submitComposer()"
              :disabled="composer.kind === 'reply' && !composer.value.trim()"
              class="grid size-12 shrink-0 place-items-center rounded-full bg-accent text-on-accent transition active:scale-90 disabled:opacity-40"
              aria-label="Готово"
            >
              <iconify-icon :icon="composer.kind === 'reply' ? 'lucide:send' : 'lucide:check'" class="text-[1.25rem]"></iconify-icon>
            </button>
          </div>
        </div>
      </div>
    </dialog>

    <dialog
      x-ref="friendsDialog"
      @close="closeFriends()"
      @cancel.prevent="closeFriends()"
      @click="$event.target === $el && closeFriends()"
      aria-label="Профиль и друзья"
    >
      <div
        x-trap.noscroll="friendsOpen"
        class="sheet-panel glass safe-b safe-x no-scrollbar absolute inset-x-0 bottom-0 max-h-[86svh] overflow-y-auto rounded-t-[2.25rem] border-t border-white/10 px-5 pb-6 pt-3"
      >
        <div class="mx-auto mb-5 h-1.5 w-11 rounded-full bg-white/25"></div>
        <div class="mx-auto max-w-[440px]">
          <button
            type="button"
            @click="openUserProfile(me)"
            class="flex w-full items-center gap-3.5 rounded-3xl border border-white/10 bg-white/5 p-3.5 text-left transition active:scale-[0.98]"
          >
            <span
              class="relative grid shrink-0 place-items-center overflow-hidden rounded-full border border-white/10 bg-white/10 text-lg font-bold text-fg"
              style="width: 3.25rem; height: 3.25rem"
            >
              <img
                x-show="me.photoUrl"
                :src="me.photoUrl"
                @error="me.photoUrl = null"
                alt=""
                class="absolute inset-0 h-full w-full object-cover"
              />
              <span x-show="!me.photoUrl" x-text="initials(me)"></span>
            </span>
            <div class="min-w-0 flex-1">
              <p class="truncate text-[17px] font-bold" x-text="me.name"></p>
              <p x-show="me.username" class="truncate text-sm text-muted" x-text="'@' + me.username"></p>
            </div>
            <iconify-icon icon="lucide:chevron-right" class="text-[1.25rem] shrink-0 text-muted"></iconify-icon>
          </button>

          <button
            @click="invite()"
            class="mt-3 flex w-full items-center justify-center gap-2 rounded-3xl bg-accent px-6 py-4 text-[16px] font-bold text-on-accent transition active:scale-[0.98]"
          >
            <iconify-icon icon="lucide:plus" class="text-[1.25rem]"></iconify-icon>
            Пригласить друга
          </button>

          <div class="mt-3 flex items-center justify-between rounded-3xl border border-white/10 bg-white/5 px-5 py-4">
            <span class="flex items-center gap-2.5 text-[16px] font-medium">
              <iconify-icon icon="lucide:bell" class="text-[1.25rem] text-muted"></iconify-icon> Уведомления
            </span>
            <button
              @click="toggleNotify()"
              class="relative h-7 w-12 shrink-0 rounded-full border border-white/10 transition-colors"
              :class="me.notify ? 'bg-accent' : 'bg-white/10'"
              role="switch"
              :aria-checked="me.notify"
            >
              <span
                class="absolute top-1 size-5 rounded-full transition-all"
                :class="me.notify ? 'left-6 bg-on-accent' : 'left-1 bg-fg'"
              ></span>
            </button>
          </div>

          <template x-if="friends.length === 0">
            <p class="mt-10 text-center text-sm text-muted">
              Пригласите друзей, чтобы видеть их моменты.
            </p>
          </template>

          <template x-if="friends.length">
            <p class="mb-3 mt-7 px-1 text-xs font-bold uppercase tracking-wide text-muted" x-text="friendsLabel"></p>
          </template>

          <ul x-auto-animate class="space-y-2">
            <template x-for="f in friends" :key="f.id">
              <li class="flex items-center gap-3 rounded-3xl border border-white/10 bg-white/5 px-4 py-3">
                <button
                  type="button"
                  @click="openUserProfile(f)"
                  class="flex min-w-0 flex-1 items-center gap-3 text-left transition active:scale-[0.98]"
                >
                  <span class="relative grid size-10 shrink-0 place-items-center overflow-hidden rounded-full border border-white/10 bg-white/10 text-sm font-bold text-fg">
                    <img
                      x-show="f.photoUrl"
                      :src="f.photoUrl"
                      @error="f.photoUrl = null"
                      alt=""
                      class="absolute inset-0 h-full w-full object-cover"
                    />
                    <span x-show="!f.photoUrl" x-text="initials(f)"></span>
                  </span>
                  <span class="min-w-0 flex-1 truncate text-[15px] font-semibold" x-text="f.name"></span>
                </button>
                <button
                  @click="removeFriend(f)"
                  class="grid size-9 place-items-center rounded-full text-muted transition active:scale-90"
                  aria-label="Удалить друга"
                >
                  <iconify-icon icon="lucide:x" class="text-[1.25rem]"></iconify-icon>
                </button>
              </li>
            </template>
          </ul>

          <template x-if="blocked.length">
            <div class="mt-9">
              <p class="px-1 text-xs font-bold uppercase tracking-wide text-muted">Заблокированные</p>
              <ul x-auto-animate class="mt-3 space-y-2">
                <template x-for="b in blocked" :key="b.id">
                  <li class="flex items-center gap-3 rounded-3xl border border-white/10 bg-white/5 px-4 py-3">
                    <span class="relative grid size-10 shrink-0 place-items-center overflow-hidden rounded-full border border-white/10 bg-white/10 text-sm font-bold text-fg">
                      <img
                        x-show="b.photoUrl"
                        :src="b.photoUrl"
                        @error="b.photoUrl = null"
                        alt=""
                        class="absolute inset-0 h-full w-full object-cover"
                      />
                      <span x-show="!b.photoUrl" x-text="initials(b)"></span>
                    </span>
                    <span class="flex-1 truncate text-[15px] font-semibold" x-text="b.name"></span>
                    <button
                      @click="unblock(b)"
                      class="rounded-full border border-white/10 px-4 py-2 text-xs font-bold text-fg transition active:scale-95"
                    >
                      Разблокировать
                    </button>
                  </li>
                </template>
              </ul>
            </div>
          </template>
        </div>
      </div>
    </dialog>

    <dialog x-ref="onboardDialog" @cancel.prevent aria-label="Добро пожаловать" class="onboard">
      <div class="fade-panel safe absolute inset-0 grid place-items-center bg-black/85 px-8 text-center">
        <div class="max-w-xs motion-safe:animate-rise">
          <p class="mb-7 text-[2.5rem] font-black tracking-[-0.04em] motion-safe:animate-float">
            Sythera
          </p>
          <h1 class="text-2xl font-extrabold tracking-[-0.02em]">Делитесь моментами</h1>
          <p class="mt-3 text-[15px] leading-relaxed text-muted">
            Снимайте моменты для близкого круга. Свайп вверх — моменты друзей, свайп вниз — снова
            камера.
          </p>
          <button
            @click="finishOnboarding()"
            class="mt-9 w-full rounded-full bg-accent px-6 py-4 text-[16px] font-bold text-on-accent transition active:scale-[0.98]"
          >
            Начать
          </button>
        </div>
      </div>
    </dialog>

    <div
      x-data="toasts"
      @notify.window="add($event.detail)"
      x-auto-animate
      class="safe-b pointer-events-none fixed inset-x-0 bottom-0 z-50 flex flex-col items-center gap-2 px-4 pb-5"
    >
      <template x-for="t in items" :key="t.id">
        <div
          @click="remove(t.id)"
          role="status"
          aria-live="polite"
          class="glass pointer-events-auto flex w-fit max-w-[88vw] items-center gap-3 break-words rounded-2xl border border-white/10 px-5 py-3 text-center text-sm font-medium shadow-2xl shadow-black/40"
        >
          <span x-text="t.text"></span>
        </div>
      </template>
    </div>
  </body>
</html>
