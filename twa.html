<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#000000" />

    <link rel="preconnect" href="https://esm.sh" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"

    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        background: #000;
      }
      body {
        color: #f5f5f7;
        font-family:
          ui-rounded, "SF Pro Rounded", "Nunito", -apple-system, BlinkMacSystemFont,
          system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      [x-cloak] {
        display: none !important;
      }
      video {
        pointer-events: none;
      }
      video::-webkit-media-controls,
      video::-webkit-media-controls-enclosure,
      video::-webkit-media-controls-panel,
      video::-webkit-media-controls-play-button {
        display: none !important;
        -webkit-appearance: none !important;
        opacity: 0 !important;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .swiper,
      .swiper-wrapper,
      .swiper-slide {
        height: 100%;
        width: 100%;
      }
      dialog {
        position: fixed;
        inset: 0;
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100svh;
        max-width: 100vw;
        max-height: 100svh;
        border: 0;
        background: transparent;
        color: inherit;
        overflow: clip;
      }
      dialog::backdrop {
        background: rgba(0, 0, 0, 0.6);
        opacity: 0;
        transition: opacity 0.32s ease;
      }
      dialog.dialog-shown::backdrop {
        opacity: 1;
      }
      dialog.onboard::backdrop {
        background: transparent;
      }
      .sheet-panel {
        translate: 0 100%;
        transition: translate 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .dialog-shown .sheet-panel {
        translate: 0 0;
      }
      .fade-panel {
        opacity: 0;
        transition: opacity 0.32s ease;
      }
      .dialog-shown .fade-panel {
        opacity: 1;
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "alpinejs": "https://esm.sh/alpinejs@3",
          "@alpinejs/focus": "https://esm.sh/@alpinejs/focus@3",
          "@telegram-apps/sdk": "https://esm.sh/@telegram-apps/sdk@3",

          "dayjs/locale/ru": "https://esm.sh/dayjs@1/locale/ru"
        }
      }
    </script>

    <style type="text/tailwindcss">

        --color-fg: #f5f5f7;
        --color-muted: #9a9aa2;
        --color-danger: #ff453a;

        --animate-rise: rise 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;

      @layer components {

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <script type="module">
      import Alpine from "alpinejs";
      import focus from "@alpinejs/focus";
      import { createClient } from "@supabase/supabase-js";
      import Swiper from "swiper";
      import { Mousewheel, Keyboard } from "swiper/modules";
      import { icons as LucideIcons } from "lucide";
      import dayjs from "dayjs";
      import relativeTime from "dayjs/plugin/relativeTime";
      import "dayjs/locale/ru";
      import {
        init as initTelegram,
        miniApp,
        viewport,
        swipeBehavior,
        closingBehavior,
        backButton,
        cloudStorage,
        hapticFeedback,
        shareURL,
        openTelegramLink,
        downloadFile,
        popup,
        requestWriteAccess,
        retrieveLaunchParams,
        retrieveRawInitData,
      } from "@telegram-apps/sdk";

      dayjs.extend(relativeTime);
      dayjs.locale("ru");

      Alpine.plugin(focus);

      /* ---------- Lucide icons via Alpine directive ---------- */
      const ICONS = {};
      for (const [key, node] of Object.entries(LucideIcons)) {
        const kebab = key.replace(/([a-z0-9])([A-Z])/g, "$1-$2").toLowerCase();
        ICONS[kebab] = node;
      }
      const buildIcon = (name) => {
        const node = ICONS[name];
        if (!node) return "";
        const inner = node
          .map(
            ([tag, attrs]) =>
              `<${tag} ${Object.entries(attrs)
                .map(([k, v]) => `${k}="${v}"`)
                .join(" ")}></${tag}>`,
          )
          .join("");
        return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%;display:block">${inner}</svg>`;
      };
      Alpine.directive("icon", (el, { value, expression }) => {
        const name = value || (expression || "").replace(/['"]/g, "");
        el.style.display = "inline-flex";
        el.innerHTML = buildIcon(name);
      });

      const CONFIG = {
        SUPABASE_URL: "https://ljzbyeulrttcrphdxyaf.supabase.co",
        SUPABASE_KEY: "sb_publishable_cYwx_MbDt32sXHTlHKZUuQ_OuvB9dem",
        BOT_USERNAME: "SytheraBot",
      };

      const REACTIONS = ["❤️", "🔥", "😂", "😮", "🥹"];
      const SIGNED_TTL = 3600;
      const UPLOAD_MAX_PX = 1080;
      const CAPTION_MAX = 80;
      const REPLY_MAX = 200;
      const PAGE = 18;

      const PR = new Intl.PluralRules("ru");
      const FRIEND_WORDS = { one: "друг", few: "друга", many: "друзей", other: "друзей" };
      const MOMENT_SELECT =
        "id, caption, image_path, created_at, author:profiles!moments_author_id_fkey(id, first_name, username, photo_url), reactions(emoji, user_id)";

      const safe = (fn) => {
        try {
          return fn();
        } catch {
          return undefined;
        }
      };
      const uuid = () => crypto.randomUUID();
      const clean = (text, max) =>
        String(text ?? "")
          .replace(/[\u0000-\u001F\u007F\u200B-\u200D\u2060\uFEFF]/g, "")
          .replace(/\s+/g, " ")
          .trim()
          .slice(0, max);
      const ago = (ts) => dayjs(ts).fromNow();

      const haptic = {
        impact: (style = "light") => safe(() => hapticFeedback.impactOccurred(style)),
        notify: (type = "success") => safe(() => hapticFeedback.notificationOccurred(type)),
        select: () => safe(() => hapticFeedback.selectionChanged()),
      };

      const toAuthor = (p) =>
        p && {
          id: p.id,
          name: p.first_name || (p.username ? `@${p.username}` : "Без имени"),
          photoUrl: p.photo_url,
        };

      Alpine.data("app", () => ({
        status: "loading",
        error: "",
        supabase: null,
        token: null,
        me: null,
        startParam: null,
        activeIndex: 0,
        screen: "camera",
        friendsOpen: false,
        captured: null,
        sending: false,
        moments: [],
        friends: [],
        blocked: [],
        feedLimit: PAGE,
        feedHasMore: false,
        loadingMore: false,
        showOnboarding: false,
        stream: null,
        facing: "user",
        torch: false,
        torchSupported: false,
        camStatus: "starting",
        lastTap: 0,
        lastTapId: null,
        channel: null,
        swiper: null,
        _starting: false,

        async init() {
          await this.boot();
          try {
            const { rawInitData, startParam } = this.launchContext();
            this.startParam = startParam;
            const session = await this.authenticate(rawInitData, startParam);
            this.token = session.token;
            this.me = session.user;
            this.supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY, {
              accessToken: async () => this.token,
            });
            await safe(() => this.supabase.realtime.setAuth());
            this.status = "ready";
            await this.loadBlocked();
            await Promise.all([this.loadFeed(), this.loadFriends()]);
            this.subscribe();
            await this.$nextTick();
            this.initSwiper();
            this.watchChrome();
            await this.handleStart();
            if (this.screen === "camera") await this.startCamera();
            this.syncChrome();
            this.maybeOnboard();
          } catch (e) {
            this.error = String(e?.message ?? e);
            this.status = "error";
          }
        },

        destroy() {
          this.stopCamera();
          this.clearCaptured();
          safe(() => this.swiper?.destroy(true, true));
          this.swiper = null;
          safe(() => this.channel && this.supabase?.removeChannel(this.channel));
          this.channel = null;
        },

        launchContext() {
          const lp = retrieveLaunchParams();
          return {
            rawInitData: retrieveRawInitData() ?? lp.tgWebAppData ?? "",
            startParam: lp.tgWebAppStartParam,
          };
        },

        async authenticate(initData, startParam) {
          const anon = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
          const { data, error } = await anon.functions.invoke("auth", {
            body: { initData, startParam },
          });
          if (error) {
            let message;
            try {
              message = (await error.context?.json())?.error;
            } catch {
              message = null;
            }
            throw new Error(message || "Не удалось войти");
          }
          return data;
        },

        async boot() {
          if (this._booted) return;
          this._booted = true;
          safe(() => initTelegram());
          safe(() => {
            if (!miniApp.mount.isAvailable()) return;
            miniApp.mount();
            if (miniApp.setHeaderColor.isAvailable()) miniApp.setHeaderColor("#000000");
            if (miniApp.setBackgroundColor.isAvailable()) miniApp.setBackgroundColor("#000000");
            if (miniApp.setBottomBarColor.isAvailable()) miniApp.setBottomBarColor("#000000");
          });
          if (safe(() => viewport.mount.isAvailable())) {
            await safe(() => viewport.mount());
            safe(() => viewport.expand.isAvailable() && viewport.expand());
            await safe(
              () => viewport.requestFullscreen.isAvailable() && viewport.requestFullscreen(),
            );
            this.bindSafeArea();
          }
          safe(() => {
            if (!swipeBehavior.mount.isAvailable()) return;
            swipeBehavior.mount();
            if (swipeBehavior.disableVertical.isAvailable()) swipeBehavior.disableVertical();
          });
          safe(() => closingBehavior.mount.isAvailable() && closingBehavior.mount());
          safe(() => {
            if (!backButton.mount.isAvailable()) return;
            backButton.mount();
            if (backButton.onClick.isAvailable()) backButton.onClick(() => this.onBack());
          });
        },

        bindSafeArea() {
          const root = document.documentElement.style;
          const apply = () => {
            const s = safe(() => viewport.safeAreaInsets()) ?? {};
            const c = safe(() => viewport.contentSafeAreaInsets()) ?? {};
            const px = (a, b) => `${(a ?? 0) + (b ?? 0)}px`;
            root.setProperty("--safe-top", px(s.top, c.top));
            root.setProperty("--safe-bottom", px(s.bottom, c.bottom));
            root.setProperty("--safe-left", px(s.left, c.left));
            root.setProperty("--safe-right", px(s.right, c.right));
          };
          apply();
          safe(() => viewport.safeAreaInsets.sub(apply));
          safe(() => viewport.contentSafeAreaInsets.sub(apply));
        },

        onBack() {
          if (this.friendsOpen) return this.closeFriends();
          if (this.captured) return this.retake();
          if (this.screen === "feed") return this.toCamera();
        },
        syncBack() {
          safe(() => {
            const visible = this.friendsOpen || !!this.captured || this.screen === "feed";
            if (visible && backButton.show.isAvailable()) backButton.show();
            else if (backButton.hide.isAvailable()) backButton.hide();
          });
        },
        syncChrome() {
          safe(() => {
            if (!closingBehavior.enableConfirmation.isAvailable()) return;
            this.captured
              ? closingBehavior.enableConfirmation()
              : closingBehavior.disableConfirmation();
          });
        },

        /* ---------- deep links ---------- */
        parseStart(param) {
          if (!param) return null;
          if (param.startsWith("m_")) return { type: "moment", id: param.slice(2) };
          if (param.startsWith("u_")) return { type: "user", id: param.slice(2) };
          return { type: "user", id: param };
        },
        async handleStart() {
          const ctx = this.parseStart(this.startParam);
          if (!ctx) return;
          if (ctx.type === "moment") {
            await this.openMoment(ctx.id);
          } else if (ctx.type === "user" && ctx.id !== this.me.id) {
            await this.loadFriends();
            if (this.friends.some((f) => f.id === ctx.id)) this.notify("Друг добавлен");
          }
        },
        async openMoment(id) {
          let idx = this.moments.findIndex((m) => m.id === id);
          if (idx === -1) {
            await this.fetchMoment(id);
            idx = this.moments.findIndex((m) => m.id === id);
          }
          if (idx === -1) return;
          await this.$nextTick();
          this.swiper?.update();
          this.swiper?.slideTo(idx + 1);
        },
        async fetchMoment(id) {
          const { data } = await this.supabase
            .from("moments")
            .select(MOMENT_SELECT)
            .eq("id", id)
            .maybeSingle();
          if (!data || this.moments.some((m) => m.id === id)) return;
          const [url] = await this.signUrls([data.image_path]);
          this.moments = [this.buildMoment(data, null, url), ...this.moments];
          await this.$nextTick();
          this.swiper?.update();
        },

        initSwiper() {
          const el = this.$refs.swiper;
          if (!el) return;
          this.swiper = new Swiper(el, {
            modules: [Mousewheel, Keyboard],
            direction: "vertical",
            speed: 360,
            threshold: 6,
            resistanceRatio: 0.65,
            observer: true,
            observeParents: true,
            mousewheel: { thresholdDelta: 8 },
            keyboard: { enabled: true },
            on: { slideChange: () => this.onSlide() },
          });
          this.lockSwipe();
        },
        onSlide() {
          const idx = this.swiper?.activeIndex ?? 0;
          if (idx !== this.activeIndex) {
            this.activeIndex = idx;
            haptic.select();
          }
          const next = idx === 0 ? "camera" : "feed";
          if (next !== this.screen) {
            this.screen = next;
            next === "feed" ? this.stopCamera() : this.startCamera();
          }
          if (this.screen === "feed" && this.moments.length && idx >= this.moments.length)
            this.loadMore();
        },
        lockSwipe() {
          if (!this.swiper) return;
          const locked = !!this.captured || this.friendsOpen;
          this.swiper.allowTouchMove = !locked;
          locked ? this.swiper.mousewheel?.disable() : this.swiper.mousewheel?.enable();
        },
        watchChrome() {
          this.$watch("captured", () => {
            this.syncBack();
            this.lockSwipe();
          });
          this.$watch("screen", () => this.syncBack());
          this.$watch("friendsOpen", (open) => {
            this.syncBack();
            this.lockSwipe();
            this.toggleDialog("friendsDialog", open);
          });
          this.$watch("showOnboarding", (open) => this.toggleDialog("onboardDialog", open));
          this.syncBack();
        },
        toggleDialog(ref, open) {
          const d = this.$refs[ref];
          if (!d) return;
          clearTimeout(d._closeTimer);
          if (open) {
            if (!d.open) safe(() => d.showModal());
            void d.offsetWidth;
            d.classList.add("dialog-shown");
          } else {
            d.classList.remove("dialog-shown");
            d._closeTimer = setTimeout(() => safe(() => d.open && d.close()), 360);
          }
        },
        toCamera() {
          if (this.captured) return;
          this.swiper?.slideTo(0);
        },
        toFeed() {
          if (this.captured) return;
          this.swiper?.slideTo(1);
        },

        openFriends() {
          haptic.select();
          this.friendsOpen = true;
        },
        closeFriends() {
          this.friendsOpen = false;
        },

        buildMoment(m, was, url) {
          const reactions = {};
          let reacted = null;
          for (const r of m.reactions ?? []) {
            reactions[r.emoji] = (reactions[r.emoji] ?? 0) + 1;
            if (r.user_id === this.me.id) reacted = r.emoji;
          }
          const keepReact = was?._reactBusy;
          return {
            id: m.id,
            caption: m.caption,
            path: m.image_path,
            url: was?.url ?? url ?? null,
            loaded: was?.loaded ?? false,
            createdAt: m.created_at,
            author: toAuthor(m.author),
            mine: m.author?.id === this.me.id,
            reactions: keepReact ? was.reactions : reactions,
            reacted: keepReact ? was.reacted : reacted,
            _reactBusy: was?._reactBusy ?? false,
            editing: was?.editing ?? false,
            draft: was?.draft ?? "",
            reply: was?.reply ?? "",
            _burst: false,
          };
        },

        async loadFeed() {
          const { data, error } = await this.supabase
            .from("moments")
            .select(MOMENT_SELECT)
            .order("created_at", { ascending: false })
            .limit(this.feedLimit);
          if (error) return;
          this.feedHasMore = data.length >= this.feedLimit;
          const prev = new Map(this.moments.map((m) => [m.id, m]));
          const fresh = data.filter((m) => !prev.get(m.id)?.url);
          const signed = await this.signUrls(fresh.map((m) => m.image_path));
          const signMap = new Map(fresh.map((m, i) => [m.id, signed[i]]));
          this.moments = data.map((m) => this.buildMoment(m, prev.get(m.id), signMap.get(m.id)));
          this.$nextTick(() => this.swiper?.update());
        },

        async reSign(m) {
          if (m._resigning || (m._reTries ?? 0) > 2) return;
          m._resigning = true;
          m._reTries = (m._reTries ?? 0) + 1;
          const [url] = await this.signUrls([m.path]);
          if (url) {
            m.loaded = false;
            m.url = url;
          }
          m._resigning = false;
        },

        async loadMore() {
          if (this.loadingMore || !this.feedHasMore) return;
          this.loadingMore = true;
          this.feedLimit += PAGE;
          await this.loadFeed();
          this.loadingMore = false;
        },

        async signUrls(paths) {
          if (!paths.length) return [];
          const { data } = await this.supabase.storage
            .from("moments")
            .createSignedUrls(paths, SIGNED_TTL);
          return (data ?? []).map((d) => d?.signedUrl ?? null);
        },

        async loadBlocked() {
          const { data } = await this.supabase
            .from("blocks")
            .select("blocked:profiles!blocks_blocked_id_fkey(id, first_name, username, photo_url)")
            .eq("blocker_id", this.me.id);
          this.blocked = (data ?? []).map((b) => toAuthor(b.blocked)).filter(Boolean);
        },

        async loadFriends() {
          const { data } = await this.supabase
            .from("friendships")
            .select("friend:profiles!friendships_friend_id_fkey(id, first_name, username, photo_url)")
            .eq("user_id", this.me.id);
          this.friends = (data ?? []).map((f) => toAuthor(f.friend)).filter(Boolean);
        },

        subscribe() {
          safe(() => {
            if (this.channel) this.supabase.removeChannel(this.channel);
            this.channel = this.supabase
              .channel("sythera")
              .on(
                "postgres_changes",
                { event: "INSERT", schema: "public", table: "moments" },
                () => {
                  haptic.notify("success");
                  this.scheduleFeedReload();
                },
              )
              .on(
                "postgres_changes",
                { event: "*", schema: "public", table: "reactions" },
                () => this.scheduleFeedReload(),
              )
              .subscribe();
          });
        },
        scheduleFeedReload() {
          clearTimeout(this._feedTimer);
          this._feedTimer = setTimeout(() => this.loadFeed(), 250);
        },

        videoTrack() {
          return this.stream?.getVideoTracks()[0] ?? null;
        },

        async startCamera() {
          if (this.screen !== "camera" || this.captured || this.stream || this._starting) return;
          this._starting = true;
          this.camStatus = "starting";
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: {
                facingMode: this.facing,
                width: { ideal: 1440 },
                height: { ideal: 1440 },
              },
              audio: false,
            });
            if (this.screen !== "camera" || this.captured) {
              stream.getTracks().forEach((t) => t.stop());
              return;
            }
            this.stream = stream;
            await this.$nextTick();
            const v = this.$refs.video;
            if (v) {
              v.muted = true;
              v.defaultMuted = true;
              v.playsInline = true;
              v.srcObject = this.stream;
              await v.play().catch(() => {});
              this.camStatus = "live";
            }
            this.refreshTorch();
          } catch {
            this.camStatus = "denied";
          } finally {
            this._starting = false;
          }
        },
        stopCamera() {
          this.disableTorch();
          this.stream?.getTracks().forEach((t) => t.stop());
          this.stream = null;
          if (this.camStatus === "live") this.camStatus = "idle";
          const v = this.$refs.video;
          if (v) v.srcObject = null;
        },
        async flipCamera() {
          haptic.impact();
          this.facing = this.facing === "user" ? "environment" : "user";
          this.stopCamera();
          await this.startCamera();
        },
        refreshTorch() {
          this.torchSupported = !!safe(() => this.videoTrack()?.getCapabilities?.().torch);
          if (!this.torchSupported) this.torch = false;
        },
        async toggleTorch() {
          if (!this.torchSupported) return this.notify("Вспышка недоступна");
          const track = this.videoTrack();
          if (!track) return;
          const next = !this.torch;
          try {
            await track.applyConstraints({ advanced: [{ torch: next }] });
            this.torch = next;
            haptic.impact();
          } catch {
            this.torch = false;
            this.notify("Не удалось включить вспышку");
          }
        },
        disableTorch() {
          if (!this.torch) return;
          safe(() => this.videoTrack()?.applyConstraints({ advanced: [{ torch: false }] }));
          this.torch = false;
        },

        async capture() {
          const v = this.$refs.video;
          if (!v || !this.stream) return;
          haptic.impact("medium");
          const size = Math.min(v.videoWidth, v.videoHeight);
          const canvas = document.createElement("canvas");
          canvas.width = canvas.height = size;
          const ctx = canvas.getContext("2d");
          if (this.facing === "user") {
            ctx.translate(size, 0);
            ctx.scale(-1, 1);
          }
          ctx.drawImage(
            v,
            (v.videoWidth - size) / 2,
            (v.videoHeight - size) / 2,
            size,
            size,
            0,
            0,
            size,
            size,
          );
          const blob = await new Promise((res) => canvas.toBlob(res, "image/jpeg", 0.92));
          this.captured = { blob, url: URL.createObjectURL(blob), caption: "" };
          this.stopCamera();
          this.syncChrome();
        },
        clearCaptured() {
          if (this.captured?.url) URL.revokeObjectURL(this.captured.url);
          this.captured = null;
        },
        retake() {
          this.clearCaptured();
          this.startCamera();
          this.syncChrome();
        },

        async resizeForUpload(blob, max = UPLOAD_MAX_PX) {
          try {
            const bitmap = await createImageBitmap(blob);
            const scale = Math.min(1, max / Math.max(bitmap.width, bitmap.height));
            const canvas = document.createElement("canvas");
            canvas.width = Math.round(bitmap.width * scale);
            canvas.height = Math.round(bitmap.height * scale);
            const ctx = canvas.getContext("2d");
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = "high";
            ctx.drawImage(bitmap, 0, 0, canvas.width, canvas.height);
            bitmap.close?.();
            return await new Promise((r) => canvas.toBlob(r, "image/jpeg", 0.85));
          } catch {
            return blob;
          }
        },

        async send() {
          if (!this.captured || this.sending) return;
          this.sending = true;
          this.syncChrome();
          try {
            const blob = await this.resizeForUpload(this.captured.blob);
            const path = `${this.me.id}/${uuid()}.jpg`;
            const up = await this.supabase.storage
              .from("moments")
              .upload(path, blob, { contentType: "image/jpeg" });
            if (up.error) throw up.error;
            const ins = await this.supabase.from("moments").insert({
              author_id: this.me.id,
              image_path: path,
              caption: clean(this.captured.caption, CAPTION_MAX) || null,
            });
            if (ins.error) throw ins.error;
            haptic.notify("success");
            this.clearCaptured();
            this.syncChrome();
            await this.loadFeed();
            this.toFeed();
            this.notify("Опубликовано");
          } catch {
            haptic.notify("error");
            this.notify("Не удалось опубликовать");
          } finally {
            this.sending = false;
            this.syncChrome();
          }
        },

        async remove(moment) {
          if (!(await this.confirm("Удалить момент?", "Это действие нельзя отменить."))) return;
          const idx = this.moments.findIndex((m) => m.id === moment.id);
          const { error } = await this.supabase.from("moments").delete().eq("id", moment.id);
          if (error) return this.notify("Не удалось удалить");
          safe(() => this.supabase.storage.from("moments").remove([moment.path]));
          haptic.notify("warning");
          this.moments = this.moments.filter((m) => m.id !== moment.id);
          await this.$nextTick();
          this.swiper?.update();
          if (!this.moments.length) return this.toCamera();
          const target = Math.min(Math.max(1, idx), this.moments.length);
          this.swiper?.slideTo(target);
        },

        startEdit(moment) {
          moment.draft = moment.caption ?? "";
          moment.editing = true;
        },
        async saveEdit(moment) {
          const caption = clean(moment.draft, CAPTION_MAX) || null;
          moment.editing = false;
          if (caption === (moment.caption ?? null)) return;
          const { error } = await this.supabase
            .from("moments")
            .update({ caption })
            .eq("id", moment.id);
          if (error) return this.notify("Не удалось сохранить");
          moment.caption = caption;
          haptic.notify("success");
        },

        share(moment) {
          haptic.impact();
          if (!shareURL.isAvailable()) return this.notify("Недоступно в этой версии Telegram");
          const link = `https://t.me/${CONFIG.BOT_USERNAME}?startapp=m_${moment.id}`;
          const text = moment.caption ? `${moment.caption} — в Sythera` : "Мой момент в Sythera";
          safe(() => shareURL(link, text));
        },

        async block(moment) {
          const author = moment.author;
          if (!author || author.id === this.me.id) return;
          if (
            !(await this.confirm(
              "Заблокировать?",
              `Вы больше не увидите моменты ${author.name}.`,
              "Заблокировать",
            ))
          )
            return;
          const { error } = await this.supabase
            .from("blocks")
            .upsert(
              { blocker_id: this.me.id, blocked_id: author.id },
              { onConflict: "blocker_id,blocked_id" },
            );
          if (error) return this.notify("Не удалось заблокировать");
          haptic.notify("warning");
          this.blocked = [...this.blocked.filter((b) => b.id !== author.id), author];
          this.moments = this.moments.filter((m) => m.author?.id !== author.id);
        },
        async unblock(user) {
          const { error } = await this.supabase
            .from("blocks")
            .delete()
            .eq("blocker_id", this.me.id)
            .eq("blocked_id", user.id);
          if (error) return this.notify("Не удалось разблокировать");
          haptic.select();
          this.blocked = this.blocked.filter((b) => b.id !== user.id);
          this.loadFeed();
        },

        async maybeOnboard() {
          let seen;
          if (cloudStorage.getItem.isAvailable())
            seen = await cloudStorage.getItem("onboarded").catch(() => null);
          this.showOnboarding = !seen;
        },
        finishOnboarding() {
          haptic.impact();
          this.showOnboarding = false;
          if (cloudStorage.setItem.isAvailable())
            cloudStorage.setItem("onboarded", "1").catch(() => {});
        },

        async react(moment, emoji) {
          haptic.impact();
          const prev = { reacted: moment.reacted, counts: { ...moment.reactions } };
          const next = moment.reacted === emoji ? null : emoji;
          if (moment.reacted)
            moment.reactions[moment.reacted] = Math.max(0, (moment.reactions[moment.reacted] ?? 1) - 1);
          if (next) moment.reactions[next] = (moment.reactions[next] ?? 0) + 1;
          moment.reacted = next;
          moment._reactBusy = true;
          const { error } = next
            ? await this.supabase
                .from("reactions")
                .upsert(
                  { moment_id: moment.id, user_id: this.me.id, emoji: next },
                  { onConflict: "moment_id,user_id" },
                )
            : await this.supabase
                .from("reactions")
                .delete()
                .eq("moment_id", moment.id)
                .eq("user_id", this.me.id);
          moment._reactBusy = false;
          if (error) {
            moment.reacted = prev.reacted;
            moment.reactions = prev.counts;
            haptic.notify("error");
          }
        },

        onImageTap(moment) {
          const now = Date.now();
          const isDouble = now - this.lastTap < 300 && this.lastTapId === moment.id;
          if (isDouble) {
            if (moment.reacted !== "❤️") this.react(moment, "❤️");
            this.burstHeart(moment);
            this.lastTap = 0;
            this.lastTapId = null;
            return;
          }
          this.lastTap = now;
          this.lastTapId = moment.id;
        },
        burstHeart(moment) {
          moment._burst = false;
          requestAnimationFrame(() => {
            moment._burst = true;
            clearTimeout(moment._burstTimer);
            moment._burstTimer = setTimeout(() => (moment._burst = false), 700);
          });
        },

        async sendReply(moment) {
          const text = clean(moment.reply, REPLY_MAX);
          if (!text) return;
          try {
            await this.supabase.functions.invoke("reply", {
              body: { momentId: moment.id, text },
            });
            moment.reply = "";
            haptic.notify("success");
            this.notify("Отправлено");
          } catch (e) {
            console.log(invoke failed:", e);
            haptic.notify("error");
            this.notify("Не удалось отправить");
          }
        },

        async toggleNotify() {
          const next = !this.me.notify;
          if (next) safe(() => requestWriteAccess.isAvailable() && requestWriteAccess());
          const { error } = await this.supabase
            .from("profiles")
            .update({ notify: next })
            .eq("id", this.me.id);
          if (!error) this.me = { ...this.me, notify: next };
          haptic.select();
        },

        invite() {
          haptic.impact();
          this.closeFriends();
          if (!shareURL.isAvailable()) return this.notify("Недоступно в этой версии Telegram");
          const link = `https://t.me/${CONFIG.BOT_USERNAME}?startapp=u_${this.me.id}`;
          safe(() => shareURL(link, "Присоединяйтесь ко мне в Sythera"));
        },

        openProfile() {
          haptic.impact();
          if (!this.me.username)
            return this.notify("У вас не задано имя пользователя в Telegram");
          if (!openTelegramLink.isAvailable())
            return this.notify("Недоступно в этой версии Telegram");
          safe(() => openTelegramLink(`https://t.me/${this.me.username}`));
        },

        async removeFriend(friend) {
          if (
            !(await this.confirm(
              "Удалить из друзей?",
              `${friend.name} больше не увидит ваши моменты.`,
            ))
          )
            return;
          const me = this.me.id;
          const { error } = await this.supabase
            .from("friendships")
            .delete()
            .or(
              `and(user_id.eq.${me},friend_id.eq.${friend.id}),and(user_id.eq.${friend.id},friend_id.eq.${me})`,
            );
          if (error) return this.notify("Не удалось удалить");
          haptic.notify("warning");
          this.friends = this.friends.filter((f) => f.id !== friend.id);
          this.loadFeed();
        },

        async save(moment) {
          haptic.impact();
          if (!downloadFile.isAvailable()) return this.notify("Недоступно в этой версии Telegram");
          try {
            await downloadFile(moment.url, `sythera-${moment.id}.jpg`);
            haptic.notify("success");
          } catch {
            this.notify("Не удалось сохранить");
          }
        },

        notify(text) {
          window.dispatchEvent(new CustomEvent("notify", { detail: { text } }));
        },
        async confirm(title, message, okText = "Удалить") {
          if (!popup.open.isAvailable()) return false;
          try {
            const id = await popup.open({
              title,
              message,
              buttons: [
                { id: "ok", type: "destructive", text: okText },
                { id: "cancel", type: "cancel" },
              ],
            });
            return id === "ok";
          } catch {
            return false;
          }
        },

        get friendsLabel() {
          const n = this.friends.length;
          return `${n} ${FRIEND_WORDS[PR.select(n)]}`;
        },
        ago,
        initials: (p) => (p?.name || "?").trim().charAt(0).toUpperCase(),
        reactionList: REACTIONS,
        captionMax: CAPTION_MAX,
        replyMax: REPLY_MAX,
      }));

      Alpine.data("toasts", () => ({
        items: [],
        add(detail) {
          const id = Date.now() + Math.random();
          this.items.push({ id, text: detail.text });
          setTimeout(() => this.remove(id), 2600);
        },
        remove(id) {
          this.items = this.items.filter((t) => t.id !== id);
        },
      }));

      window.Alpine = Alpine;
      Alpine.start();
    </script>
  </head>

  <body x-data="app" class="h-svh overflow-hidden bg-bg font-sans text-fg">
    <!-- ГЛАВНЫЙ СТЕКЛЯННЫЙ ФОН -->
    <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden bg-black">
      <div class="absolute -left-[20%] -top-[15%] h-[65vh] w-[65vh] rounded-full bg-indigo-600/35 blur-[90px] motion-safe:animate-float"></div>
      <div class="absolute -right-[18%] top-[25%] h-[60vh] w-[60vh] rounded-full bg-fuchsia-600/30 blur-[100px] motion-safe:animate-float" style="animation-delay:-3s"></div>
      <div class="absolute -bottom-[20%] left-[15%] h-[65vh] w-[65vh] rounded-full bg-sky-500/25 blur-[100px] motion-safe:animate-float" style="animation-delay:-6s"></div>
      <div class="absolute inset-0 backdrop-blur-2xl"></div>
    </div>

    <div x-show="status === 'loading'" class="fixed inset-0 grid place-items-center">
      <p class="text-[2.75rem] font-black tracking-[-0.04em] text-fg motion-safe:animate-float">
        Sythera
      </p>
    </div>

    <div
      x-show="status === 'error'"
      x-cloak
      class="safe grid h-svh place-items-center px-8 text-center"
    >
      <div class="max-w-sm motion-safe:animate-rise">
        <h1 class="text-2xl font-bold tracking-tight">Что-то пошло не так</h1>
        <p class="mt-3 text-[15px] leading-relaxed text-muted" x-text="error"></p>
        <button
          @click="status = 'loading'; init()"
          class="mt-6 rounded-full bg-accent px-6 py-3 text-[15px] font-semibold text-on-accent transition active:scale-95"
        >
          Повторить
        </button>
      </div>
    </div>

    <div x-show="status === 'ready'" x-cloak class="fixed inset-0">
      <div class="swiper" x-ref="swiper">
        <div class="swiper-wrapper">
          <!-- ===== КАМЕРА ===== -->
          <div class="swiper-slide">
            <section class="flex h-full flex-col items-center justify-center gap-9 px-5">
              <div
                class="relative aspect-square w-full max-w-[420px] shrink overflow-hidden rounded-[2.75rem] border border-white/10 bg-white/[0.04] shadow-[0_40px_90px_-30px_rgba(0,0,0,0.9)]"
                style="max-height: 56svh"
              >
                <video
                  x-show="!captured && camStatus === 'live'"
                  x-ref="video"
                  playsinline
                  muted
                  disablepictureinpicture
                  @playing="stream && (camStatus = 'live')"
                  @loadedmetadata="$el.play().catch(() => {})"
                  @pause="stream && $el.play().catch(() => {})"
                  class="h-full w-full object-cover"
                  :class="facing === 'user' && '-scale-x-100'"
                ></video>

                <div
                  x-show="!captured && camStatus === 'starting'"
                  class="absolute inset-0 grid place-items-center"
                >
                  <span
                    class="size-8 rounded-full border-2 border-white/20 border-t-white/80 motion-safe:animate-spin-slow"
                  ></span>
                </div>

                <img
                  x-show="captured"
                  x-cloak
                  x-transition:enter="animate-shot"
                  :src="captured?.url"
                  alt=""
                  class="h-full w-full object-cover"
                />

                <template x-if="captured">
                  <div class="absolute inset-x-4 bottom-4">
                    <input
                      x-model="captured.caption"
                      :maxlength="captionMax"
                      enterkeyhint="done"
                      placeholder="Добавьте подпись"
                      class="glass-dark w-full rounded-full border border-white/15 py-3.5 pl-14 pr-14 text-center text-[15px] font-medium text-fg placeholder:text-white/55 focus:outline-none"
                    />
                    <span
                      x-show="captured.caption?.length"
                      class="pointer-events-none absolute right-5 top-1/2 -translate-y-1/2 text-[11px] tabular-nums text-muted"
                      x-text="(captured.caption?.length || 0) + '/' + captionMax"
                    ></span>
                  </div>
                </template>

                <div
                  x-show="!captured && camStatus === 'denied'"
                  x-cloak
                  class="absolute inset-0 grid place-items-center px-8 text-center"
                >
                  <div>
                    <div class="mx-auto mb-4 grid size-14 place-items-center rounded-full border border-white/10 bg-white/5">
                      <span x-icon:camera-off class="size-7 text-muted"></span>
                    </div>
                    <p class="text-[15px] font-semibold">Нет доступа к камере</p>
                    <p class="mt-1 text-sm text-muted">
                      Разрешите доступ к камере в настройках Telegram.
                    </p>
                  </div>
                </div>
              </div>

              <!-- управление съёмкой -->
              <div x-show="!captured" class="flex w-full max-w-[340px] items-center justify-between">
                <button
                  @click="flipCamera()"
                  aria-label="Сменить камеру"
                  class="grid size-14 place-items-center rounded-full text-white/70 transition active:scale-90 active:text-fg"
                >
                  <span x-icon:switch-camera class="size-8"></span>
                </button>

                <button
                  @click="capture()"
                  :disabled="camStatus !== 'live'"
                  aria-label="Снимок"
                  class="grid size-[5.5rem] place-items-center rounded-full ring-[5px] ring-fg/85 transition active:scale-90 disabled:opacity-40"
                >
                  <span class="size-[4.4rem] rounded-full bg-fg transition active:scale-95"></span>
                </button>

                <div class="grid size-14 place-items-center">
                  <button
                    x-show="torchSupported"
                    @click="toggleTorch()"
                    aria-label="Вспышка"
                    class="grid size-14 place-items-center rounded-full transition active:scale-90"
                    :class="torch ? 'text-yellow-300' : 'text-white/70 active:text-fg'"
                  >
                    <span x-icon:zap class="size-8"></span>
                  </button>
                </div>
              </div>

              <!-- управление снимком -->
              <div
                x-show="captured"
                x-cloak
                class="flex w-full max-w-[340px] items-center justify-between"
              >
                <button
                  @click="retake()"
                  aria-label="Переснять"
                  class="grid size-14 place-items-center rounded-full text-white/70 transition active:scale-90 active:text-fg"
                >
                  <span x-icon:rotate-ccw class="size-8"></span>
                </button>

                <button
                  @click="send()"
                  :disabled="sending"
                  aria-label="Опубликовать"
                  class="grid size-[5.5rem] place-items-center rounded-full bg-accent text-on-accent shadow-[0_18px_40px_-12px_rgba(245,245,247,0.5)] transition active:scale-90 disabled:opacity-50"
                >
                  <span x-show="!sending" x-icon:send class="size-8"></span>
                  <span
                    x-show="sending"
                    x-cloak
                    class="size-7 rounded-full border-2 border-on-accent/30 border-t-on-accent motion-safe:animate-spin-slow"
                  ></span>
                </button>

                <div class="size-14"></div>
              </div>
            </section>
          </div>

          <!-- ===== ПУСТАЯ ЛЕНТА ===== -->
          <template x-if="!moments.length">
            <div class="swiper-slide">
              <div class="flex h-full flex-col items-center justify-center px-8 text-center">
                <div class="mx-auto max-w-xs motion-safe:animate-rise">
                  <div class="mx-auto mb-5 grid size-16 place-items-center rounded-[1.5rem] border border-white/10 bg-white/5">
                    <span x-icon:image class="size-8 text-muted"></span>
                  </div>
                  <p class="text-[17px] font-bold">Здесь появятся моменты</p>
                  <p class="mt-1.5 text-sm leading-relaxed text-muted">
                    Сделайте первый снимок, чтобы поделиться им с друзьями.
                  </p>
                </div>
              </div>
            </div>
          </template>

          <!-- ===== МОМЕНТЫ (стиль Locket) ===== -->
          <template x-for="m in moments" :key="m.id">
            <div class="swiper-slide">
              <div class="flex h-full flex-col justify-center gap-5 px-5">
                <div class="mx-auto w-full max-w-[440px] motion-safe:animate-rise">
                  <!-- ШАПКА (по центру) -->
                  <div class="relative mb-4 flex items-center justify-center">
                    <div class="flex min-w-0 items-center gap-2.5">
                      <span
                        class="relative grid size-8 shrink-0 place-items-center overflow-hidden rounded-full border border-white/10 bg-white/10 text-xs font-bold text-fg"
                      >
                        <img
                          x-show="m.author.photoUrl"
                          :src="m.author.photoUrl"
                          @error="m.author.photoUrl = null"
                          alt=""
                          class="absolute inset-0 h-full w-full object-cover"
                        />
                        <span x-show="!m.author.photoUrl" x-text="initials(m.author)"></span>
                      </span>
                      <div class="min-w-0 text-center">
                        <p class="truncate text-[15px] font-bold leading-tight" x-text="m.mine ? 'Вы' : m.author.name"></p>
                      </div>
                      <span class="text-xs text-muted">·</span>
                      <span class="shrink-0 text-xs text-muted" x-text="ago(m.createdAt)"></span>
                    </div>

                    <!-- меню (Pines dropdown) -->
                    <div
                      x-data="{ open: false }"
                      @keydown.escape.window="open = false"
                      class="absolute right-0"
                    >
                      <button
                        @click.stop="open = !open"
                        class="grid size-9 place-items-center rounded-full text-muted transition active:scale-90"
                        aria-label="Ещё"
                        :aria-expanded="open"
                      >
                        <span x-icon:more-horizontal class="size-5"></span>
                      </button>
                      <div
                        x-show="open"
                        x-cloak
                        @click.away="open = false"
                        x-transition:enter="transition ease-out duration-150"
                        x-transition:enter-start="opacity-0 scale-95"
                        x-transition:enter-end="opacity-100 scale-100"
                        x-transition:leave="transition ease-in duration-100"
                        x-transition:leave-start="opacity-100 scale-100"
                        x-transition:leave-end="opacity-0 scale-95"
                        class="glass-dark absolute right-0 z-30 mt-1 w-56 origin-top-right overflow-hidden rounded-2xl border border-white/10 p-1 text-[15px] shadow-2xl shadow-black/60"
                      >
                        <button @click="save(m); open = false" class="flex w-full items-center gap-3 rounded-xl px-4 py-2.5 text-left transition active:bg-white/10">
                          <span x-icon:download class="size-4 text-muted"></span> Сохранить
                        </button>
                        <button @click="share(m); open = false" class="flex w-full items-center gap-3 rounded-xl px-4 py-2.5 text-left transition active:bg-white/10">
                          <span x-icon:share-2 class="size-4 text-muted"></span> Поделиться
                        </button>
                        <template x-if="m.mine">
                          <div>
                            <button @click="startEdit(m); open = false" class="flex w-full items-center gap-3 rounded-xl px-4 py-2.5 text-left transition active:bg-white/10">
                              <span x-icon:pencil class="size-4 text-muted"></span> Изменить подпись
                            </button>
                            <button @click="remove(m); open = false" class="flex w-full items-center gap-3 rounded-xl px-4 py-2.5 text-left text-danger transition active:bg-white/10">
                              <span x-icon:trash-2 class="size-4"></span> Удалить
                            </button>
                          </div>
                        </template>
                        <template x-if="!m.mine">
                          <button @click="block(m); open = false" class="flex w-full items-center gap-3 rounded-xl px-4 py-2.5 text-left text-danger transition active:bg-white/10">
                            <span x-icon:user-x class="size-4"></span> Заблокировать
                          </button>
                        </template>
                      </div>
                    </div>
                  </div>

                  <!-- ФОТО -->
                  <div
                    class="relative aspect-square overflow-hidden rounded-[2.5rem] border border-white/10 bg-white/5 shadow-[0_40px_90px_-30px_rgba(0,0,0,0.95)]"
                    @click="onImageTap(m)"
                  >
                    <img
                      :src="m.url"
                      alt=""
                      loading="lazy"
                      decoding="async"
                      @load="m.loaded = true"
                      @error="reSign(m)"
                      class="h-full w-full object-cover transition-opacity duration-500 motion-reduce:transition-none"
                      :class="m.loaded ? 'opacity-100' : 'opacity-0'"
                    />
                    <span
                      x-show="m._burst"
                      class="pointer-events-none absolute inset-0 grid place-items-center text-8xl motion-safe:animate-heart motion-reduce:hidden [text-shadow:0_4px_16px_rgba(0,0,0,0.45)]"
                      aria-hidden="true"
                      >❤️</span
                    >
                    <p
                      x-show="m.caption && !m.editing"
                      class="glass-dark absolute inset-x-4 bottom-4 line-clamp-3 break-words rounded-2xl border border-white/15 px-4 py-2.5 text-center text-[15px] font-medium"
                      x-text="m.caption"
                    ></p>
                    <div
                      x-show="m.editing"
                      x-cloak
                      @click.stop
                      class="absolute inset-x-4 bottom-4 flex items-center gap-2"
                    >
                      <input
                        x-model="m.draft"
                        :maxlength="captionMax"
                        enterkeyhint="done"
                        @keydown.enter="saveEdit(m)"
                        placeholder="Подпись"
                        class="glass-dark min-w-0 flex-1 rounded-full border border-white/15 px-4 py-2.5 text-center text-[15px] text-fg placeholder:text-white/55 focus:outline-none"
                      />
                      <button
                        @click="saveEdit(m)"
                        class="glass-dark grid size-10 shrink-0 place-items-center rounded-full border border-white/15 text-fg transition active:scale-90"
                        aria-label="Сохранить подпись"
                      >
                        <span x-icon:check class="size-5"></span>
                      </button>
                    </div>
                  </div>

                  <!-- РЕАКЦИИ (стеклянная панель Locket) -->
                  <div class="mt-4 flex justify-center">
                    <div class="glass flex items-center gap-1 rounded-full border border-white/10 p-1.5">
                      <template x-for="e in reactionList" :key="e">
                        <button
                          @click="react(m, e)"
                          class="relative grid h-11 min-w-11 place-items-center rounded-full px-2 text-2xl transition active:scale-90"
                          :class="m.reacted === e ? 'bg-white/15' : 'opacity-55 active:opacity-100'"
                        >
                          <span x-text="e"></span>
                          <span
                            x-show="m.reactions[e]"
                            class="absolute -right-0.5 -top-0.5 min-w-4 rounded-full bg-accent px-1 text-[10px] font-bold leading-4 text-on-accent tabular-nums"
                            x-text="m.reactions[e]"
                          ></span>
                        </button>
                      </template>
                    </div>
                  </div>

                  <!-- СООБЩЕНИЕ -->
                  <div x-show="!m.mine" class="mt-3.5 px-1">
                    <div class="flex items-center gap-2">
                      <div class="relative min-w-0 flex-1">
                        <input
                          x-model="m.reply"
                          @keydown.enter="sendReply(m)"
                          :maxlength="replyMax"
                          enterkeyhint="send"
                          placeholder="Отправить сообщение..."
                          class="glass w-full rounded-full border border-white/10 py-3.5 pl-5 pr-14 text-[15px] text-fg placeholder:text-muted focus:outline-none"
                        />
                        <span
                          x-show="m.reply?.length"
                          class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-[11px] tabular-nums text-muted"
                          x-text="(m.reply?.length || 0) + '/' + replyMax"
                        ></span>
                      </div>
                      <button
                        @click="sendReply(m)"
                        :disabled="!m.reply?.trim()"
                        class="grid size-12 shrink-0 place-items-center rounded-full bg-accent text-on-accent transition active:scale-90 disabled:opacity-40"
                        aria-label="Отправить"
                      >
                        <span x-icon:send class="size-5"></span>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- ШАПКА КАМЕРЫ (учёт safe-area Telegram) -->
      <header
        x-show="screen === 'camera' && !captured"
        class="safe-t pointer-events-none absolute inset-x-0 top-0 z-20 flex flex-col items-center gap-3 px-4"
      >
        <div class="h-2"></div>
        <button
          @click="openFriends()"
          class="glass pointer-events-auto flex max-w-[80vw] items-center gap-2.5 rounded-full border border-white/10 py-1.5 pl-1.5 pr-4 transition active:scale-95"
        >
          <span
            class="relative grid size-8 shrink-0 place-items-center overflow-hidden rounded-full border border-white/10 bg-white/10 text-xs font-bold text-fg"
          >
            <img
              x-show="me.photoUrl"
              :src="me.photoUrl"
              @error="me.photoUrl = null"
              alt=""
              class="absolute inset-0 h-full w-full object-cover"
            />
            <span x-show="!me.photoUrl" x-text="initials(me)"></span>
          </span>
          <span class="truncate text-[15px] font-bold" x-text="friendsLabel"></span>
          <span x-icon:chevron-down class="size-4 shrink-0 text-muted"></span>
        </button>
      </header>

      <div
        x-show="screen === 'camera' && !captured"
        class="safe-b pointer-events-none absolute inset-x-0 bottom-0 z-20 flex justify-center pb-4"
      >
        <button
          @click="toFeed()"
          class="pointer-events-auto flex flex-col items-center gap-1 text-white/55 transition active:scale-90"
        >
          <span class="text-[13px] font-bold uppercase tracking-wide">История</span>
          <span x-icon:chevron-up class="size-5 motion-safe:animate-bounce"></span>
        </button>
      </div>

      <div
        x-show="screen === 'feed' && !captured"
        x-cloak
        class="safe-t pointer-events-none absolute inset-x-0 top-0 z-20 flex justify-center"
      >
        <button
          @click="toCamera()"
          class="glass pointer-events-auto mt-3 grid size-11 place-items-center rounded-full border border-white/10 text-fg transition active:scale-90"
          aria-label="К камере"
        >
          <span x-icon:camera class="size-5"></span>
        </button>
      </div>
    </div>

    <!-- ===== ПРОФИЛЬ И ДРУЗЬЯ ===== -->
    <dialog
      x-ref="friendsDialog"
      @close="closeFriends()"
      @cancel.prevent="closeFriends()"
      @click="$event.target === $el && closeFriends()"
      aria-label="Профиль и друзья"
    >
      <div
        x-trap.noscroll="friendsOpen"
        class="sheet-panel glass safe-b safe-x no-scrollbar absolute inset-x-0 bottom-0 max-h-[86svh] overflow-y-auto rounded-t-[2.25rem] border-t border-white/10 px-5 pb-6 pt-3"
      >
        <div class="mx-auto mb-5 h-1.5 w-11 rounded-full bg-white/25"></div>
        <div class="mx-auto max-w-[440px]">
          <button
            type="button"
            @click="openProfile()"
            class="flex w-full items-center gap-3.5 rounded-3xl border border-white/10 bg-white/5 p-3.5 text-left transition active:scale-[0.98]"
          >
            <span
              class="relative grid size-13 shrink-0 place-items-center overflow-hidden rounded-full border border-white/10 bg-white/10 text-lg font-bold text-fg"
              style="width: 3.25rem; height: 3.25rem"
            >
              <img
                x-show="me.photoUrl"
                :src="me.photoUrl"
                @error="me.photoUrl = null"
                alt=""
                class="absolute inset-0 h-full w-full object-cover"
              />
              <span x-show="!me.photoUrl" x-text="initials(me)"></span>
            </span>
            <div class="min-w-0 flex-1">
              <p class="truncate text-[17px] font-bold" x-text="me.name"></p>
              <p x-show="me.username" class="truncate text-sm text-muted" x-text="'@' + me.username"></p>
            </div>
            <span x-icon:chevron-right class="size-5 shrink-0 text-muted"></span>
          </button>

          <button
            @click="invite()"
            class="mt-3 flex w-full items-center justify-center gap-2 rounded-3xl bg-accent px-6 py-4 text-[16px] font-bold text-on-accent transition active:scale-[0.98]"
          >
            <span x-icon:plus class="size-5"></span>
            Пригласить друга
          </button>

          <div class="mt-3 flex items-center justify-between rounded-3xl border border-white/10 bg-white/5 px-5 py-4">
            <span class="flex items-center gap-2.5 text-[16px] font-medium">
              <span x-icon:bell class="size-5 text-muted"></span> Уведомления
            </span>
            <button
              @click="toggleNotify()"
              class="relative h-7 w-12 shrink-0 rounded-full border border-white/10 transition-colors"
              :class="me.notify ? 'bg-accent' : 'bg-white/10'"
              role="switch"
              :aria-checked="me.notify"
            >
              <span
                class="absolute top-1 size-5 rounded-full transition-all"
                :class="me.notify ? 'left-6 bg-on-accent' : 'left-1 bg-fg'"
              ></span>
            </button>
          </div>

          <template x-if="friends.length === 0">
            <p class="mt-10 text-center text-sm text-muted">
              Пригласите друзей, чтобы видеть их моменты.
            </p>
          </template>

          <template x-if="friends.length">
            <p class="mb-3 mt-7 px-1 text-xs font-bold uppercase tracking-wide text-muted" x-text="friendsLabel"></p>
          </template>

          <ul class="space-y-2">
            <template x-for="f in friends" :key="f.id">
              <li class="flex items-center gap-3 rounded-3xl border border-white/10 bg-white/5 px-4 py-3">
                <span class="relative grid size-10 shrink-0 place-items-center overflow-hidden rounded-full border border-white/10 bg-white/10 text-sm font-bold text-fg">
                  <img
                    x-show="f.photoUrl"
                    :src="f.photoUrl"
                    @error="f.photoUrl = null"
                    alt=""
                    class="absolute inset-0 h-full w-full object-cover"
                  />
                  <span x-show="!f.photoUrl" x-text="initials(f)"></span>
                </span>
                <span class="flex-1 truncate text-[15px] font-semibold" x-text="f.name"></span>
                <button
                  @click="removeFriend(f)"
                  class="grid size-9 place-items-center rounded-full text-muted transition active:scale-90"
                  aria-label="Удалить друга"
                >
                  <span x-icon:x class="size-5"></span>
                </button>
              </li>
            </template>
          </ul>

          <template x-if="blocked.length">
            <div class="mt-9">
              <p class="px-1 text-xs font-bold uppercase tracking-wide text-muted">Заблокированные</p>
              <ul class="mt-3 space-y-2">
                <template x-for="b in blocked" :key="b.id">
                  <li class="flex items-center gap-3 rounded-3xl border border-white/10 bg-white/5 px-4 py-3">
                    <span class="relative grid size-10 shrink-0 place-items-center overflow-hidden rounded-full border border-white/10 bg-white/10 text-sm font-bold text-fg">
                      <img
                        x-show="b.photoUrl"
                        :src="b.photoUrl"
                        @error="b.photoUrl = null"
                        alt=""
                        class="absolute inset-0 h-full w-full object-cover"
                      />
                      <span x-show="!b.photoUrl" x-text="initials(b)"></span>
                    </span>
                    <span class="flex-1 truncate text-[15px] font-semibold" x-text="b.name"></span>
                    <button
                      @click="unblock(b)"
                      class="rounded-full border border-white/10 px-4 py-2 text-xs font-bold text-fg transition active:scale-95"
                    >
                      Разблокировать
                    </button>
                  </li>
                </template>
              </ul>
            </div>
          </template>
        </div>
      </div>
    </dialog>

    <!-- ===== ОНБОРДИНГ ===== -->
    <dialog x-ref="onboardDialog" @cancel.prevent aria-label="Добро пожаловать" class="onboard">
      <div class="fade-panel safe absolute inset-0 grid place-items-center bg-black/85 px-8 text-center">
        <div class="max-w-xs motion-safe:animate-rise">
          <p class="mb-7 text-[2.5rem] font-black tracking-[-0.04em] motion-safe:animate-float">
            Sythera
          </p>
          <h1 class="text-2xl font-extrabold tracking-[-0.02em]">Делитесь моментами</h1>
          <p class="mt-3 text-[15px] leading-relaxed text-muted">
            Снимайте моменты для близкого круга. Свайп вверх — история друзей, свайп вниз — снова
            камера.
          </p>
          <button
            @click="finishOnboarding()"
            class="mt-9 w-full rounded-full bg-accent px-6 py-4 text-[16px] font-bold text-on-accent transition active:scale-[0.98]"
          >
            Начать
          </button>
        </div>
      </div>
    </dialog>

    <!-- ===== ТОСТЫ (Pines) ===== -->
    <div
      x-data="toasts"
      @notify.window="add($event.detail)"
      class="safe-b pointer-events-none fixed inset-x-0 bottom-0 z-50 flex flex-col items-center gap-2 px-4 pb-5"
    >
      <template x-for="t in items" :key="t.id">
        <div
          x-show="true"
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0 translate-y-4"
          x-transition:enter-end="opacity-100 translate-y-0"
          x-transition:leave="transition ease-in duration-200"
          x-transition:leave-start="opacity-100 translate-y-0"
          x-transition:leave-end="opacity-0 translate-y-4"
          @click="remove(t.id)"
          role="status"
          aria-live="polite"
          class="glass pointer-events-auto flex w-fit max-w-[88vw] items-center gap-3 break-words rounded-2xl border border-white/10 px-5 py-3 text-center text-sm font-medium shadow-2xl shadow-black/40"
        >
          <span x-text="t.text"></span>
        </div>
      </template>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
  </body>
</html>
