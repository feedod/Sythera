<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="format-detection" content="telephone=no" />
    <title>ORBITA</title>

    <link rel="preconnect" href="https://esm.sh" crossorigin />
    <link rel="preconnect" href="https://xpyjmvzewqikxhkdoqog.supabase.co" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link rel="preconnect" href="https://api.iconify.design" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @layer theme, base, components, utilities;

      @theme {
        --font-sans: "Nunito", -apple-system, system-ui, sans-serif;
        --font-mono: "SF Mono", ui-monospace, Menlo, monospace;
        --color-bg: #000000;
        --color-fg: #f5f5f7;
        --color-muted: #98989f;
        --color-faint: #6a6a72;
        --color-danger: #ff453a;
        --color-verify: #34d399;
        --color-develop: #ff9f0a;
        --color-single: #8a8a90;
        --color-hairline: rgb(255 255 255 / 0.1);
        --color-hairline-strong: rgb(255 255 255 / 0.16);
        --color-fill: rgb(255 255 255 / 0.05);
        --color-fill-2: rgb(255 255 255 / 0.1);
        --color-accent: #f5f5f7;
        --color-on-accent: #0a0a0a;
        --ease-spring: cubic-bezier(0.32, 0.72, 0, 1);
        --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      }

      @layer base {
        *,
        *::before,
        *::after {
          box-sizing: border-box;
        }
        html,
        body {
          height: 100%;
          margin: 0;
          background: #000;
          overscroll-behavior: none;
        }
        :root {
          color-scheme: dark;
          --safe-top: env(safe-area-inset-top, 0px);
          --safe-bottom: env(safe-area-inset-bottom, 0px);
          --safe-left: env(safe-area-inset-left, 0px);
          --safe-right: env(safe-area-inset-right, 0px);
          --sa-top: env(safe-area-inset-top, 0px);
          --sa-right: env(safe-area-inset-right, 0px);
        }
        body {
          height: 100svh;
          overflow: hidden;
          color: var(--color-fg);
          font-family:
            ui-rounded, "SF Pro Rounded", "Nunito", -apple-system,
            BlinkMacSystemFont, system-ui, sans-serif;
          font-optical-sizing: auto;
          letter-spacing: -0.011em;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
          text-rendering: optimizeLegibility;
          -webkit-tap-highlight-color: transparent;
          -webkit-user-select: none;
          user-select: none;
          touch-action: manipulation;
          overscroll-behavior: none;
        }
        h1, h2, h3, p, ul { margin: 0; }
        ul { padding: 0; list-style: none; }
        button {
          font: inherit;
          letter-spacing: inherit;
          color: inherit;
          background: none;
          border: 0;
          padding: 0;
          cursor: pointer;
          text-align: inherit;
          touch-action: manipulation;
        }
        svg, iconify-icon { display: block; }
        [x-cloak] { display: none !important; }
        ::selection { background: rgb(245 245 247 / 0.22); }
        :where(button, a, [role="button"], [tabindex]):focus { outline: none; }
        :where(button, a, [role="button"]) {
          transition: transform 0.2s var(--ease-spring);
        }
        :where(button, a, [role="button"]):active { transform: scale(0.96); }
      }

      @layer components {
        .ic { display: block; width: 1em; height: 1em; flex: none; font-size: 1.25rem; }
        .spinner {
          width: 1.75rem; height: 1.75rem;
          border: 2px solid rgb(255 255 255 / 0.15);
          border-top-color: var(--color-fg);
          border-radius: 50%;
        }
        .disc {
          margin: 0 auto 1rem;
          display: grid; place-items: center;
          width: 3.5rem; height: 3.5rem;
          border-radius: 1.25rem;
          border: 1px solid var(--color-hairline);
          background: var(--color-fill);
        }
        .disc .ic { font-size: 1.75rem; color: var(--color-muted); }

        .chip {
          display: inline-flex; align-items: center; gap: 0.375rem;
          flex: none;
          padding: 0.4rem 0.8rem;
          border-radius: 999px;
          border: 1px solid var(--color-hairline);
          background: var(--color-fill);
          color: var(--color-muted);
          font-size: 0.8125rem;
          font-weight: 700;
          letter-spacing: -0.01em;
          transition: color 0.2s, border-color 0.2s, background 0.2s;
        }
        .chip[data-on="true"] {
          background: var(--color-fill-2);
          border-color: var(--color-hairline-strong);
          color: var(--color-fg);
        }
        .chip-n { font-size: 0.6875rem; font-variant-numeric: tabular-nums; opacity: 0.75; }

        .card {
          width: 100%;
          display: block;
          border: 1px solid var(--color-hairline);
          background: var(--color-fill);
          border-radius: 1.5rem;
          padding: 0.9rem 1rem;
          transition: transform 0.2s var(--ease-spring), border-color 0.2s;
        }
        .card:active { transform: scale(0.985); }
        .card[data-hot="true"] { border-color: rgb(255 69 58 / 0.35); }

        .tier {
          display: inline-flex; align-items: center; gap: 0.3rem;
          flex: none;
          padding: 0.2rem 0.5rem;
          border-radius: 999px;
          border: 1px solid var(--color-hairline);
          font-size: 0.625rem;
          font-weight: 800;
          text-transform: uppercase;
          letter-spacing: 0.04em;
        }
        .tier-dot { width: 0.375rem; height: 0.375rem; border-radius: 50%; flex: none; }
        .tier[data-t="verified"] { color: var(--color-verify); border-color: rgb(52 211 153 / 0.35); background: rgb(52 211 153 / 0.1); }
        .tier[data-t="verified"] .tier-dot { background: var(--color-verify); }
        .tier[data-t="developing"] { color: var(--color-develop); border-color: rgb(255 159 10 / 0.35); background: rgb(255 159 10 / 0.1); }
        .tier[data-t="developing"] .tier-dot { background: var(--color-develop); }
        .tier[data-t="single"] { color: var(--color-muted); }
        .tier[data-t="single"] .tier-dot { background: var(--color-faint); }

        .meter { display: inline-flex; gap: 0.1875rem; }
        .meter-seg { width: 0.9375rem; height: 0.1875rem; border-radius: 999px; background: var(--color-fill-2); }
        .meter[data-t="verified"] .meter-seg[data-on="true"] { background: var(--color-verify); }
        .meter[data-t="developing"] .meter-seg[data-on="true"] { background: var(--color-develop); }
        .meter[data-t="single"] .meter-seg[data-on="true"] { background: var(--color-single); }

        .src-tag {
          flex: none;
          padding: 0.15rem 0.45rem;
          border-radius: 0.5rem;
          border: 1px solid var(--color-hairline);
          background: var(--color-fill-2);
          font-size: 0.625rem;
          font-weight: 800;
          text-transform: uppercase;
          letter-spacing: 0.03em;
          color: var(--color-muted);
        }

        .skel {
          height: 6rem;
          border-radius: 1.5rem;
          background: linear-gradient(90deg, var(--color-fill) 25%, var(--color-fill-2) 50%, var(--color-fill) 75%);
          background-size: 200% 100%;
        }

        .lead {
          font-size: 0.9375rem;
          line-height: 1.55;
          color: color-mix(in oklab, var(--color-fg) 88%, transparent);
        }
        .section-label {
          font-size: 0.6875rem;
          font-weight: 800;
          text-transform: uppercase;
          letter-spacing: 0.12em;
          color: var(--color-faint);
        }
        .tl { position: relative; display: flex; flex-direction: column; }
        .tl-item {
          position: relative;
          display: grid;
          grid-template-columns: 1.25rem 1fr;
          gap: 0.625rem;
          padding-bottom: 1rem;
        }
        .tl-item:last-child { padding-bottom: 0; }
        .tl-rail {
          position: relative;
          display: flex;
          justify-content: center;
        }
        .tl-rail::before {
          content: "";
          position: absolute;
          top: 0.9rem;
          bottom: -0.1rem;
          width: 1.5px;
          background: var(--color-hairline);
        }
        .tl-item:last-child .tl-rail::before { display: none; }
        .tl-dot {
          margin-top: 0.28rem;
          width: 0.6rem;
          height: 0.6rem;
          border-radius: 50%;
          border: 2px solid var(--color-bg);
          box-shadow: 0 0 0 1px var(--color-hairline-strong);
          z-index: 1;
        }
        .tl-first .tl-dot { background: var(--color-verify); box-shadow: 0 0 0 3px rgb(52 211 153 / 0.18); }
        .tl-body { min-width: 0; }
        .tl-meta { display: flex; align-items: center; gap: 0.5rem; }
        .tl-time { font-size: 0.6875rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--color-muted); }
        .tl-text { margin-top: 0.2rem; font-size: 0.8125rem; line-height: 1.5; color: color-mix(in oklab, var(--color-fg) 78%, transparent); overflow-wrap: anywhere; }

        dialog {
          margin: 0; padding: 0; max-width: 100%; max-height: 100%;
          width: 100%; height: 100%;
          border: 0; background: transparent; color: inherit; overflow: hidden;
        }
        dialog::backdrop {
          background: rgb(0 0 0 / 0.55);
          -webkit-backdrop-filter: blur(5px) saturate(120%);
          backdrop-filter: blur(5px) saturate(120%);
          opacity: 0;
          transition: opacity 0.4s var(--ease-out);
        }
        dialog.dialog-shown::backdrop { opacity: 1; }
        .sheet {
          position: absolute; inset: auto 0 0 0;
          max-height: 86svh; overflow-y: auto;
          border-top: 1px solid var(--color-hairline);
          border-radius: 2.25rem 2.25rem 0 0;
          background: rgb(22 22 24 / 0.72);
          -webkit-backdrop-filter: blur(30px) saturate(180%) brightness(1.06);
          backdrop-filter: blur(30px) saturate(180%) brightness(1.06);
          box-shadow: inset 0 1px 0 0 rgb(255 255 255 / 0.12);
          padding: 0.75rem calc(1.25rem + var(--safe-right))
            calc(1.5rem + var(--safe-bottom)) calc(1.25rem + var(--safe-left));
          scrollbar-width: none;
          touch-action: pan-y;
          transform: translateY(100%);
          transition: transform 0.46s var(--ease-spring);
        }
        .sheet::-webkit-scrollbar { display: none; }
        .dialog-shown .sheet { transform: translateY(0); }
        .grip { margin: 0 auto 1.25rem; height: 0.3125rem; width: 2.5rem; border-radius: 999px; background: rgb(255 255 255 / 0.25); }

        .btn {
          display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
          width: 100%;
          border: 1px solid var(--color-hairline-strong);
          border-radius: 1.125rem;
          padding: 0.85rem 1.25rem;
          font-size: 0.9375rem; font-weight: 700;
          color: var(--color-fg);
        }
        .btn:active { transform: scale(0.98); }

        .toast {
          display: inline-flex; align-items: center; gap: 0.5rem;
          padding: 0.6rem 0.95rem;
          border-radius: 999px;
          border: 1px solid var(--color-hairline-strong);
          background: rgb(22 22 24 / 0.82);
          -webkit-backdrop-filter: blur(24px) saturate(180%);
          backdrop-filter: blur(24px) saturate(180%);
          color: var(--color-fg);
          font-size: 0.8125rem; font-weight: 700;
          box-shadow: 0 12px 40px rgb(0 0 0 / 0.5);
          transform: translateY(-14px);
          opacity: 0;
          transition: transform 0.32s var(--ease-spring), opacity 0.32s ease;
        }
        .toast[data-show="true"] { transform: translateY(0); opacity: 1; }
      }

      @keyframes rise {
        from { opacity: 0; transform: translateY(12px) scale(0.985); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }
      @keyframes spin { to { transform: rotate(360deg) translateZ(0); } }
      @keyframes breathe {
        0%, 100% { transform: translate3d(0,0,0) scale(1); opacity: 1; }
        50% { transform: translate3d(0,0,0) scale(0.62); opacity: 0.55; }
      }
      @media (prefers-reduced-motion: no-preference) {
        .rise { animation: rise 0.5s var(--ease-out) both; }
        .spinner { animation: spin 0.9s linear infinite; will-change: transform; }
        .breathe { animation: breathe 2.4s ease-in-out infinite; will-change: transform; }
        .skel { animation: shimmer 1.4s linear infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation: none !important; transition-duration: 0.01ms !important; }
      }
    </style>
    <script src="https://unpkg.com/iconify-icon@2" defer></script>
  </head>
  <body>
    <div x-data="app" x-cloak class="flex h-svh flex-col">
      <div
        x-show="status !== 'ready'"
        class="fixed inset-0 z-50 grid place-items-center bg-bg"
      >
        <div x-show="status === 'boot'" class="grid justify-items-center gap-4">
          <span class="text-[0.8125rem] font-black uppercase tracking-[0.28em] text-muted">ORBITA</span>
          <span class="spinner"></span>
        </div>
        <div x-show="status === 'fatal'" x-cloak class="grid w-full max-w-[22rem] justify-items-center gap-3 px-8 text-center">
          <div class="disc"><iconify-icon class="ic" icon="lucide:satellite" aria-hidden="true"></iconify-icon></div>
          <p class="text-[0.9375rem] leading-relaxed text-muted" x-text="fatal"></p>
        </div>
      </div>

      <template x-if="status === 'ready'">
        <div class="contents">
          <header
            class="pointer-events-none relative z-10 flex items-center justify-between gap-3 px-[calc(1rem+var(--safe-left))] pr-[calc(1rem+var(--safe-right))] pb-2"
            :style="`padding-top: calc(0.5rem + var(--safe-top))`"
          >
            <div class="flex items-center gap-2">
              <iconify-icon class="text-[1.15rem] text-fg" icon="lucide:radar" aria-hidden="true"></iconify-icon>
              <span class="text-[0.9375rem] font-black tracking-[0.16em] text-fg">ORBITA</span>
            </div>
            <div class="flex items-center gap-2 text-[0.75rem] font-semibold text-muted">
              <span class="tabular-nums" x-text="syncLabel"></span>
              <span
                class="h-[0.4375rem] w-[0.4375rem] rounded-full"
                :class="syncStale ? 'bg-danger' : 'bg-verify breathe'"
                :style="syncStale ? 'box-shadow:0 0 8px rgb(255 69 58/.7)' : 'box-shadow:0 0 8px rgb(52 211 153/.7)'"
              ></span>
            </div>
          </header>

          <section class="relative -mt-[calc(0.5rem+var(--safe-top)+2.25rem)] h-[46svh] min-h-[15rem] flex-none overflow-hidden">
            <div class="absolute inset-0" x-ref="globe"></div>
            <div
              x-show="!globeReady"
              class="absolute inset-0 grid place-items-center text-[0.6875rem] uppercase tracking-[0.22em] text-faint"
            >инициализация</div>
            <div
              x-show="globeReady"
              class="pointer-events-none absolute left-[calc(1rem+var(--safe-left))] flex flex-col gap-1 text-[0.625rem] font-bold uppercase tracking-[0.1em] text-muted"
              :style="`top: calc(var(--safe-top) + 3rem)`"
            >
              <span class="flex items-center gap-1.5">событий<span class="tabular-nums text-fg" x-text="visible.length"></span></span>
              <span class="flex items-center gap-1.5">проверено<span class="tabular-nums text-verify" x-text="verifiedCount"></span></span>
            </div>
            <div class="pointer-events-none absolute inset-x-0 bottom-0 h-16 bg-linear-to-b from-transparent to-bg"></div>
          </section>

          <nav class="flex flex-none gap-2 overflow-x-auto px-[calc(1rem+var(--safe-left))] pr-[calc(1rem+var(--safe-right))] pb-1 [-ms-overflow-style:none] [scrollbar-width:none]">
            <template x-for="f in filters" :key="f.key">
              <button class="chip" :data-on="activeFilter === f.key" @click="setFilter(f.key)">
                <span x-text="f.label"></span>
                <span class="chip-n" x-text="countFor(f.key)"></span>
              </button>
            </template>
          </nav>

          <main
            class="flex-1 overflow-y-auto px-[calc(1rem+var(--safe-left))] pr-[calc(1rem+var(--safe-right))] pt-2.5 [-webkit-overflow-scrolling:touch] [scrollbar-width:none]"
            style="padding-bottom: calc(1.5rem + var(--safe-bottom))"
            x-ref="feed"
          >
            <template x-if="loading">
              <div class="flex flex-col gap-2.5">
                <template x-for="i in 5" :key="i"><div class="skel"></div></template>
              </div>
            </template>

            <template x-if="!loading && error">
              <div class="grid justify-items-center gap-3 py-14 text-center">
                <div class="disc"><iconify-icon class="ic" icon="lucide:cloud-off" aria-hidden="true"></iconify-icon></div>
                <p class="max-w-[16rem] text-[0.875rem] leading-relaxed text-muted">Не удалось загрузить события. Проверьте связь.</p>
                <button class="btn max-w-[12rem]" @click="load()">Повторить</button>
              </div>
            </template>

            <template x-if="!loading && !error && !visible.length">
              <div class="grid justify-items-center gap-3 py-14 text-center">
                <div class="disc"><iconify-icon class="ic" icon="lucide:radar" aria-hidden="true"></iconify-icon></div>
                <p class="max-w-[17rem] text-[0.875rem] leading-relaxed text-muted">Событий по фильтру нет. Картина обновляется каждые 15 минут.</p>
              </div>
            </template>

            <ul x-show="!loading && !error && visible.length" x-stagger class="flex flex-col gap-2.5">
              <template x-for="s in visible" :key="s.id">
                <li>
                  <button class="card" :data-hot="s.priority === 'high'" @click="open(s)">
                    <div class="flex items-center gap-2">
                      <span class="tier" :data-t="s.tier">
                        <span class="tier-dot"></span>
                        <span x-text="tierLabel(s.tier)"></span>
                      </span>
                      <span class="ml-auto flex items-center gap-1 text-[0.6875rem] font-semibold text-faint">
                        <iconify-icon class="text-[0.8125rem]" icon="lucide:radio" aria-hidden="true"></iconify-icon>
                        <span class="tabular-nums" x-text="s.source_count"></span>
                      </span>
                      <time class="text-[0.6875rem] font-semibold tabular-nums text-faint" x-text="ago(s.last_seen)"></time>
                    </div>
                    <h2 class="mt-2 text-[0.9375rem] font-bold leading-snug text-fg" x-text="s.title"></h2>
                    <div class="mt-2.5 flex items-center gap-2.5">
                      <span class="meter" :data-t="s.tier">
                        <template x-for="i in 5" :key="i">
                          <span class="meter-seg" :data-on="i <= Math.round(s.credibility / 20)"></span>
                        </template>
                      </span>
                      <span class="text-[0.625rem] font-bold tabular-nums" :class="tierTextClass(s.tier)" x-text="s.credibility"></span>
                      <span class="ml-auto flex min-w-0 items-center gap-1 text-[0.6875rem] font-semibold" :class="s.lat != null ? 'text-muted' : 'text-faint'">
                        <iconify-icon class="text-[0.8125rem]" :icon="s.lat != null ? 'lucide:map-pin' : 'lucide:map-pin-off'" aria-hidden="true"></iconify-icon>
                        <span class="truncate" x-text="s.place || 'без геопривязки'"></span>
                      </span>
                    </div>
                  </button>
                </li>
              </template>
            </ul>
          </main>
        </div>
      </template>

      <div
        class="pointer-events-none fixed inset-x-0 z-[60] flex justify-center px-4"
        :style="`top: calc(var(--safe-top) + 0.5rem)`"
      >
        <button class="toast pointer-events-auto" :data-show="toast.show" @click="applyToast()">
          <span class="h-[0.375rem] w-[0.375rem] rounded-full bg-develop breathe"></span>
          <span x-text="toast.text"></span>
        </button>
      </div>

      <dialog
        x-ref="sheet"
        @close="onSheetClose()"
        @cancel.prevent="close()"
        @click="$event.target === $el && close()"
        aria-label="Событие"
      >
        <div x-sheet="close()" class="sheet">
          <div class="grip"></div>
          <div class="mx-auto max-w-[30rem]">
            <template x-if="detail">
              <div>
                <div class="flex items-center gap-2">
                  <span class="tier" :data-t="detail.tier">
                    <span class="tier-dot"></span>
                    <span x-text="tierLabel(detail.tier)"></span>
                  </span>
                  <span class="meter" :data-t="detail.tier">
                    <template x-for="i in 5" :key="i">
                      <span class="meter-seg" :data-on="i <= Math.round(detail.credibility / 20)"></span>
                    </template>
                  </span>
                  <span class="ml-auto text-[0.75rem] font-bold tabular-nums" :class="tierTextClass(detail.tier)" x-text="detail.credibility + '/100'"></span>
                </div>

                <h2 class="mt-3 text-[1.1875rem] font-extrabold leading-[1.28] text-balance" x-text="detail.title"></h2>

                <div class="mt-2.5 flex flex-wrap items-center gap-x-3 gap-y-1 text-[0.75rem] font-semibold text-muted">
                  <span x-show="detail.place" class="flex items-center gap-1">
                    <iconify-icon class="text-[0.8125rem]" icon="lucide:map-pin" aria-hidden="true"></iconify-icon>
                    <span x-text="detail.place"></span>
                  </span>
                  <span class="flex items-center gap-1">
                    <iconify-icon class="text-[0.8125rem]" icon="lucide:radio" aria-hidden="true"></iconify-icon>
                    <span x-text="detail.source_count + ' · ' + detail.source_type_count + ' тип.'"></span>
                  </span>
                  <span class="flex items-center gap-1 tabular-nums">
                    <iconify-icon class="text-[0.8125rem]" icon="lucide:clock" aria-hidden="true"></iconify-icon>
                    <span x-text="span(detail)"></span>
                  </span>
                </div>

                <p x-show="lead" class="lead mt-3.5" x-text="lead"></p>

                <p class="mt-3.5 text-[0.75rem] leading-relaxed text-faint" x-text="hint(detail)"></p>

                <div class="mt-5 flex items-center gap-2">
                  <span class="section-label">Хронология</span>
                  <span class="h-px flex-1 bg-[var(--color-hairline)]"></span>
                  <span class="text-[0.6875rem] font-bold tabular-nums text-faint" x-text="chronology.length"></span>
                </div>

                <template x-if="membersLoading">
                  <div class="mt-4 flex flex-col gap-2.5">
                    <div class="skel !h-[3rem]"></div>
                    <div class="skel !h-[3rem]"></div>
                    <div class="skel !h-[3rem]"></div>
                  </div>
                </template>

                <div x-show="!membersLoading" class="tl mt-4">
                  <template x-for="(m, i) in chronology" :key="m.id">
                    <div class="tl-item" :class="i === 0 && 'tl-first'">
                      <div class="tl-rail">
                        <span class="tl-dot" :style="i === 0 ? '' : srcDot(m.source_type)"></span>
                      </div>
                      <button class="tl-body text-left" @click="openUrl(m.url)">
                        <div class="tl-meta">
                          <span class="src-tag" :style="srcColor(m.source_type)" x-text="m.source_name"></span>
                          <time class="tl-time" x-text="stamp(m.published_at)"></time>
                          <iconify-icon x-show="m.url" class="text-[0.8125rem] text-faint" icon="lucide:arrow-up-right" aria-hidden="true"></iconify-icon>
                        </div>
                        <p class="tl-text" x-text="m.body || m.title"></p>
                      </button>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </div>
      </dialog>
    </div>

    <script type="importmap">
      {
        "imports": {
          "alpinejs": "https://esm.sh/alpinejs@3.15.12",
          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.108.2",
          "@telegram-apps/sdk": "https://esm.sh/@telegram-apps/sdk@3.11.8",
          "@use-gesture/vanilla": "https://esm.sh/@use-gesture/vanilla@10.3.1",
          "motion/mini": "https://esm.sh/motion@12/mini",
          "globe.gl": "https://esm.sh/globe.gl@2.34.4"
        }
      }
    </script>

    <script type="module">
      import Alpine from "alpinejs";
      import { createClient } from "@supabase/supabase-js";
      import {
        init as initTelegram,
        isTMA,
        miniApp,
        viewport,
        swipeBehavior,
        closingBehavior,
        backButton,
        hapticFeedback,
        openTelegramLink,
        openLink,
        postEvent,
      } from "@telegram-apps/sdk";
      import { DragGesture } from "@use-gesture/vanilla";
      import { animate as motionAnimate } from "motion/mini";
      import Globe from "globe.gl";

      const CONFIG = {
        SUPABASE_URL: "https://xpyjmvzewqikxhkdoqog.supabase.co",
        SUPABASE_KEY: "sb_publishable_3-f4f3PXrWpsRblrS5aI-w_vGXR_pfD",
        REFRESH_MS: 90000,
        STALE_MS: 30 * 60 * 1000,
        FEED_LIMIT: 120,
      };

      const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

      const log = (...a) => console.warn("[orbita]", ...a);
      const safe = (fn) => {
        try {
          const r = fn();
          return r && typeof r.then === "function" ? r.catch((e) => (log(e), undefined)) : r;
        } catch (e) {
          log(e);
          return undefined;
        }
      };
      const reducedMotion = () => matchMedia("(prefers-reduced-motion: reduce)").matches;
      const haptic = {
        impact: (s = "light") => safe(() => hapticFeedback.impactOccurred(s)),
        select: () => safe(() => hapticFeedback.selectionChanged()),
      };
      const withTimeout = (p, ms) =>
        Promise.race([p, new Promise((_, r) => setTimeout(() => r(new Error("timeout")), ms))]);

      const DT = new Intl.DateTimeFormat("ru", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" });
      const TIER_LABEL = { verified: "проверено", developing: "развивается", single: "один источник" };
      const SRC_COLOR = {
        tg_channel: "color:#5ac8fa;border-color:rgb(90 200 250/.35)",
        gdelt: "color:#ff9f0a;border-color:rgb(255 159 10/.3)",
        usgs: "color:#c88fe0;border-color:rgb(200 143 224/.35)",
        firms: "color:#c88fe0;border-color:rgb(200 143 224/.35)",
        rss: "",
      };
      const SRC_DOT = {
        tg_channel: "#5ac8fa",
        gdelt: "#ff9f0a",
        usgs: "#c88fe0",
        firms: "#c88fe0",
        rss: "#8a8a90",
      };

      const PR = new Intl.PluralRules("ru");
      const EVENT_WORDS = { one: "новое событие", few: "новых события", many: "новых событий", other: "новых событий" };

      Alpine.directive("sheet", (el, { expression }, { evaluate, cleanup }) => {
        const DISMISS = 110;
        let engaged = false, dragging = false;
        const reset = () => {
          el.style.transition = "";
          el.style.transform = "";
          el.style.willChange = "";
          el.style.overflowY = "";
          engaged = dragging = false;
        };
        const canDrag = (node) => {
          for (let n = node; n && n !== el.parentNode; n = n.parentNode)
            if (n.scrollTop > 0) return false;
          return true;
        };
        const gesture = new DragGesture(
          el,
          (state) => {
            const my = state.movement[1];
            if (state.first) { engaged = canDrag(state.event.target); dragging = false; }
            if (!engaged) return;
            if (state.active) {
              if (!dragging) {
                if (state.axis !== "y" || my <= 0) { engaged = false; return; }
                dragging = true;
                el.style.transition = "none";
                el.style.willChange = "transform";
                el.style.overflowY = "hidden";
              }
              if (state.event?.cancelable) state.event.preventDefault();
              el.style.transform = `translateY(${Math.max(0, my)}px)`;
            } else {
              const fling = state.velocity[1] > 0.5 && state.direction[1] > 0;
              const shouldClose = dragging && (my > DISMISS || fling);
              reset();
              if (shouldClose) { haptic.select(); evaluate(expression); }
            }
          },
          { axis: "y", filterTaps: true, threshold: 6, pointer: { touch: true }, eventOptions: { passive: false } },
        );
        cleanup(() => gesture.destroy());
      });

      Alpine.directive("stagger", (el, {}, { cleanup }) => {
        if (reducedMotion()) return;
        let raf = 0;
        const run = () => {
          const items = [...el.children];
          items.forEach((c, i) => {
            motionAnimate(
              c,
              { opacity: [0, 1], transform: ["translateY(10px) scale(0.985)", "translateY(0) scale(1)"] },
              { duration: 0.42, delay: Math.min(i * 0.035, 0.4), easing: [0.22, 1, 0.36, 1] },
            );
          });
        };
        const obs = new MutationObserver(() => {
          cancelAnimationFrame(raf);
          raf = requestAnimationFrame(run);
        });
        obs.observe(el, { childList: true });
        raf = requestAnimationFrame(run);
        cleanup(() => { obs.disconnect(); cancelAnimationFrame(raf); });
      });

      Alpine.data("app", () => ({
        status: "boot",
        fatal: "",
        stories: [],
        members: [],
        loading: true,
        membersLoading: false,
        error: false,
        activeFilter: "all",
        detail: null,
        globeReady: false,
        lastSync: null,
        now: Date.now(),
        toast: { show: false, text: "" },
        _globe: null,
        _ro: null,
        _timer: null,
        _clock: null,
        _toastTimer: null,
        _focusTimer: null,
        _seq: 0,
        _seen: new Set(),

        filters: [
          { key: "all", label: "Все" },
          { key: "verified", label: "Проверено" },
          { key: "developing", label: "Развивается" },
          { key: "hot", label: "Срочное" },
          { key: "geo", label: "На карте" },
        ],

        async init() {
          addEventListener("unhandledrejection", (e) => log("rejection", e.reason));
          document.addEventListener("touchstart", () => {}, { passive: true });

          let inside = false;
          try { inside = isTMA("simple"); } catch { inside = false; }
          if (!inside) {
            this.fatal = "Откройте приложение внутри Telegram.";
            this.status = "fatal";
            return;
          }

          await this.boot();
          this.status = "ready";
          this._clock = setInterval(() => (this.now = Date.now()), 30000);
          await this.load();
          this._timer = setInterval(() => this.load(true), CONFIG.REFRESH_MS);
          this.$nextTick(() => this.mountGlobe());
          this.$watch("visible", () => this.paintGlobe());
        },

        destroy() {
          clearInterval(this._timer);
          clearInterval(this._clock);
          clearTimeout(this._toastTimer);
          clearTimeout(this._focusTimer);
          this._ro?.disconnect();
          this._globe?._destructor?.();
        },

        async boot() {
          safe(() => initTelegram());
          safe(() => { if (miniApp.mount.isAvailable()) miniApp.mount(); });
          safe(() => { if (miniApp.setHeaderColor.isAvailable()) miniApp.setHeaderColor("#000000"); });
          safe(() => { if (miniApp.setBackgroundColor.isAvailable()) miniApp.setBackgroundColor("#000000"); });
          if (safe(() => viewport.mount.isAvailable())) await safe(() => viewport.mount());
          safe(() => { if (viewport.expand.isAvailable()) viewport.expand(); });
          if (safe(() => viewport.requestFullscreen.isAvailable())) await safe(() => viewport.requestFullscreen());
          this.bindSafeArea();
          safe(() => postEvent("web_app_toggle_orientation_lock", { locked: true }));
          safe(() => {
            if (!swipeBehavior.mount.isAvailable()) return;
            swipeBehavior.mount();
            if (swipeBehavior.disableVertical.isAvailable()) swipeBehavior.disableVertical();
          });
          safe(() => { if (closingBehavior.mount.isAvailable()) closingBehavior.mount(); });
          safe(() => {
            if (!backButton.mount.isAvailable()) return;
            backButton.mount();
            backButton.onClick(() => this.close());
          });
        },

        bindSafeArea() {
          const root = document.documentElement.style;
          const apply = () => {
            const s = safe(() => viewport.safeAreaInsets()) ?? {};
            const c = safe(() => viewport.contentSafeAreaInsets()) ?? {};
            const px = (a, b) => `${(a ?? 0) + (b ?? 0)}px`;
            root.setProperty("--safe-top", px(s.top, c.top));
            root.setProperty("--safe-bottom", px(s.bottom, c.bottom));
            root.setProperty("--safe-left", px(s.left, c.left));
            root.setProperty("--safe-right", px(s.right, c.right));
            root.setProperty("--sa-top", `${s.top ?? 0}px`);
            root.setProperty("--sa-right", `${s.right ?? 0}px`);
          };
          apply();
          safe(() => viewport.safeAreaInsets.sub(apply));
          safe(() => viewport.contentSafeAreaInsets.sub(apply));
        },

        get visible() {
          const s = this.stories;
          if (this.activeFilter === "all") return s;
          if (this.activeFilter === "hot") return s.filter((x) => x.priority === "high");
          if (this.activeFilter === "geo") return s.filter((x) => x.lat != null);
          return s.filter((x) => x.tier === this.activeFilter);
        },
        get verifiedCount() {
          return this.visible.filter((x) => x.tier === "verified").length;
        },
        get syncStale() {
          return !this.lastSync || this.now - this.lastSync > CONFIG.STALE_MS;
        },
        get syncLabel() {
          if (!this.lastSync) return "—";
          const m = Math.floor((this.now - this.lastSync) / 60000);
          return m < 1 ? "сейчас" : `${m} мин`;
        },

        countFor(key) {
          const s = this.stories;
          if (key === "all") return s.length;
          if (key === "hot") return s.filter((x) => x.priority === "high").length;
          if (key === "geo") return s.filter((x) => x.lat != null).length;
          return s.filter((x) => x.tier === key).length;
        },

        async load(silent = false) {
          const seq = ++this._seq;
          if (!silent) { this.loading = true; this.error = false; }
          try {
            const { data, error } = await withTimeout(
              supabase
                .from("stories")
                .select("id, title, place, lat, lon, priority, credibility, tier, source_count, source_type_count, first_seen, last_seen")
                .order("last_seen", { ascending: false })
                .limit(CONFIG.FEED_LIMIT),
              12000,
            );
            if (error) throw error;
            const rows = data.map((r) => ({ ...r, first_seen: new Date(r.first_seen).getTime(), last_seen: new Date(r.last_seen).getTime() }));
            if (seq !== this._seq) return;
            if (silent && this._seen.size) {
              const fresh = rows.filter((r) => !this._seen.has(r.id)).length;
              if (fresh > 0) this.showToast(`${fresh} ${EVENT_WORDS[PR.select(fresh)]}`);
            }
            this.stories = rows;
            this._seen = new Set(rows.map((r) => r.id));
            this.lastSync = Date.now();
            this.error = false;
          } catch (e) {
            log(e);
            if (seq !== this._seq) return;
            if (!silent) this.error = true;
          } finally {
            if (seq === this._seq) this.loading = false;
          }
        },

        async loadMembers(story) {
          this.membersLoading = true;
          this.members = [];
          try {
            const { data, error } = await withTimeout(
              supabase
                .from("posts")
                .select("id, source_type, source_name, title, body, url, published_at")
                .eq("story_id", story.id)
                .order("published_at", { ascending: true }),
              10000,
            );
            if (error) throw error;
            this.members = data.map((m) => ({ ...m, published_at: new Date(m.published_at).getTime() }));
          } catch (e) {
            log(e);
          } finally {
            this.membersLoading = false;
          }
        },

        get chronology() {
          return this.members;
        },
        get lead() {
          const withBody = this.members
            .filter((m) => m.body && m.body.length > 40)
            .sort((a, b) => b.body.length - a.body.length);
          return withBody[0]?.body ?? "";
        },

        mountGlobe() {
          const el = this.$refs.globe;
          const globe = Globe()(el)
            .width(el.clientWidth)
            .height(el.clientHeight)
            .backgroundColor("rgba(0,0,0,0)")
            .globeImageUrl("https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-night.jpg")
            .atmosphereColor("#2a4a7a")
            .atmosphereAltitude(0.16)
            .pointAltitude((d) => 0.008 + (d.credibility / 100) * 0.02)
            .pointRadius((d) => 0.32 + (d.credibility / 100) * 0.5)
            .pointColor((d) =>
              d.tier === "verified" ? "#34d399" : d.tier === "developing" ? "#ff9f0a" : "#8a8a90",
            )
            .ringColor((d) => {
              const c = d.tier === "verified" ? "52,211,153" : "255,159,10";
              return (t) => `rgba(${c},${1 - t})`;
            })
            .ringMaxRadius((d) => (d.priority === "high" ? 5 : 3.2))
            .ringPropagationSpeed((d) => (d.priority === "high" ? 2 : 1.2))
            .ringRepeatPeriod((d) => (d.priority === "high" ? 1100 : 2200))
            .labelLat((d) => d.lat)
            .labelLng((d) => d.lng)
            .labelText((d) => d.text)
            .labelSize(0.9)
            .labelDotRadius(0.2)
            .labelColor(() => "rgba(245,245,247,0.82)")
            .labelResolution(2)
            .arcColor(() => ["rgba(255,69,58,0.05)", "rgba(255,69,58,0.75)"])
            .arcStroke(0.4)
            .arcDashLength(0.5)
            .arcDashGap(0.25)
            .arcDashAnimateTime(2200)
            .arcAltitudeAutoScale(0.4)
            .onPointClick((d) => {
              const s = this.stories.find((x) => x.id === d.id);
              if (s) this.open(s);
            })
            .onLabelClick((d) => {
              const s = this.stories.find((x) => x.id === d.id);
              if (s) this.open(s);
            });
          const c = globe.controls();
          c.autoRotate = true;
          c.autoRotateSpeed = 0.4;
          c.enableZoom = true;
          c.enablePan = false;
          c.minDistance = 180;
          c.maxDistance = 420;
          globe.pointOfView({ lat: 30, lng: 60, altitude: 2.4 }, 0);
          this._globe = globe;
          this.globeReady = true;
          this.paintGlobe();
          this.$nextTick(() => this.focusNewestHot());
          this._ro = new ResizeObserver(() => globe.width(el.clientWidth).height(el.clientHeight));
          this._ro.observe(el);
        },

        paintGlobe() {
          if (!this._globe) return;
          const geo = this.visible.filter((s) => s.lat != null);
          const pts = geo.map((s) => ({
            id: s.id, lat: s.lat, lng: s.lon, tier: s.tier, credibility: s.credibility, priority: s.priority,
          }));
          this._globe.pointsData(pts);
          this._globe.ringsData(pts.filter((s) => s.tier === "verified" || s.priority === "high"));

          const labels = [...geo]
            .sort((a, b) => b.credibility - a.credibility)
            .slice(0, 6)
            .map((s) => ({ id: s.id, lat: s.lat, lng: s.lon, text: s.place ? s.place.split(",")[0] : "" }))
            .filter((l) => l.text);
          this._globe.labelsData(labels);

          const hot = geo.filter((s) => s.priority === "high").slice(0, 6);
          const arcs = [];
          for (let i = 0; i < hot.length - 1; i++)
            arcs.push({ startLat: hot[i].lat, startLng: hot[i].lon, endLat: hot[i + 1].lat, endLng: hot[i + 1].lon });
          this._globe.arcsData(arcs);
        },

        focusNewestHot() {
          const hot = this.visible.find((s) => s.priority === "high" && s.lat != null);
          const target = hot ?? this.visible.find((s) => s.lat != null);
          if (!target || !this._globe) return;
          this._globe.controls().autoRotate = false;
          this._globe.pointOfView({ lat: target.lat, lng: target.lon, altitude: 1.7 }, 1400);
          clearTimeout(this._focusTimer);
          this._focusTimer = setTimeout(() => {
            if (this._globe && !this.detail) this._globe.controls().autoRotate = true;
          }, 5200);
        },

        flyTo(s) {
          if (!this._globe || s.lat == null) return;
          clearTimeout(this._focusTimer);
          this._globe.controls().autoRotate = false;
          this._globe.pointOfView({ lat: s.lat, lng: s.lon, altitude: 1.5 }, 800);
        },

        setFilter(key) {
          this.activeFilter = key;
          haptic.select();
          this.$refs.feed.scrollTo({ top: 0, behavior: reducedMotion() ? "auto" : "smooth" });
        },

        open(s) {
          this.detail = s;
          this.loadMembers(s);
          this.flyTo(s);
          haptic.impact("light");
          const d = this.$refs.sheet;
          if (!d.open) safe(() => d.showModal());
          void d.offsetWidth;
          d.classList.add("dialog-shown");
          safe(() => backButton.show.isAvailable() && backButton.show());
        },

        close() {
          const d = this.$refs.sheet;
          d.classList.remove("dialog-shown");
          clearTimeout(d._t);
          d._t = setTimeout(() => d.open && safe(() => d.close()), 480);
          safe(() => backButton.hide.isAvailable() && backButton.hide());
        },

        onSheetClose() {
          this.$refs.sheet.classList.remove("dialog-shown");
          this.detail = null;
          this.members = [];
          if (this._globe) this._globe.controls().autoRotate = true;
        },

        showToast(text) {
          this.toast = { show: true, text };
          clearTimeout(this._toastTimer);
          this._toastTimer = setTimeout(() => (this.toast.show = false), 4500);
        },
        applyToast() {
          this.toast.show = false;
          haptic.select();
          this.$refs.feed.scrollTo({ top: 0, behavior: reducedMotion() ? "auto" : "smooth" });
        },

        openUrl(url) {
          if (!url) return;
          haptic.impact("light");
          if (/^https:\/\/t\.me\//i.test(url)) openTelegramLink(url);
          else openLink(url);
        },

        tierLabel: (t) => TIER_LABEL[t] ?? TIER_LABEL.single,
        tierTextClass: (t) =>
          t === "verified" ? "text-verify" : t === "developing" ? "text-develop" : "text-faint",
        srcColor: (t) => SRC_COLOR[t] ?? "",
        srcDot: (t) => `background:${SRC_DOT[t] ?? "#8a8a90"}`,

        hint(s) {
          const n = s.source_count;
          const word = n === 1 ? "независимый источник" : n >= 2 && n <= 4 ? "независимых источника" : "независимых источников";
          const types = s.source_type_count > 1 ? `${s.source_type_count} типа источников` : "один тип источника";
          const geo = s.lat != null ? ", есть геоподтверждение" : "";
          return `Достоверность ${s.credibility}/100 — ${n} ${word}, ${types}${geo}.`;
        },

        span(s) {
          const dur = s.last_seen - s.first_seen;
          if (dur < 120000) return DT.format(s.first_seen);
          const h = Math.floor(dur / 3600000);
          const m = Math.floor((dur % 3600000) / 60000);
          const len = h > 0 ? `${h} ч ${m} мин` : `${m} мин`;
          return `развитие ${len}`;
        },

        stamp(ts) {
          return DT.format(ts);
        },

        ago(ts) {
          const d = this.now - ts;
          if (d < 60000) return "сейчас";
          if (d < 3600000) return `${Math.floor(d / 60000)} мин`;
          if (d < 86400000) return `${Math.floor(d / 3600000)} ч`;
          return `${Math.floor(d / 86400000)} д`;
        },
      }));

      queueMicrotask(() => Alpine.start());
    </script>
  </body>
</html>
