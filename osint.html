<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>ORBITA</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script type="importmap">
{
  "imports": {
    "alpinejs": "https://esm.sh/alpinejs@3.14.9",
    "globe.gl": "https://esm.sh/globe.gl@2.34.4",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.49.4"
  }
}
</script>
<style>
:root {
  --bg: #060a12;
  --bg-raise: #0b1220;
  --bg-card: #0e1626;
  --line: #1a2438;
  --amber: #f0a832;
  --amber-dim: #8a6420;
  --data: #8fa8c8;
  --text: #dce6f2;
  --mute: #5a6b84;
  --alert: #e05252;
  --ok: #46b878;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior: none; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, "SF Pro Text", Roboto, system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}
.mono { font-family: "SF Mono", ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; }
[x-cloak] { display: none !important; }

.shell { display: flex; flex-direction: column; height: 100dvh; }

.topbar {
  padding: calc(var(--safe-top) + 10px) 16px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  background: linear-gradient(180deg, rgba(6,10,18,.96), rgba(6,10,18,.7) 70%, transparent);
  position: relative;
  z-index: 5;
}
.brand { display: flex; align-items: baseline; gap: 8px; }
.brand-name {
  font-family: "SF Mono", ui-monospace, Menlo, monospace;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: .22em;
  color: var(--amber);
}
.brand-tag { font-size: 10px; letter-spacing: .14em; color: var(--mute); text-transform: uppercase; }
.pulse-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--ok);
  box-shadow: 0 0 8px rgba(70,184,120,.8);
  animation: breathe 2.4s ease-in-out infinite;
  will-change: transform;
}
.pulse-dot.stale { background: var(--alert); box-shadow: 0 0 8px rgba(224,82,82,.8); animation: none; }
@keyframes breathe {
  0%, 100% { transform: translate3d(0,0,0) scale(1); opacity: 1; }
  50% { transform: translate3d(0,0,0) scale(.7); opacity: .6; }
}
.sync-meta { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--mute); }

.globe-zone {
  position: relative;
  height: 44dvh;
  min-height: 260px;
  flex: none;
  overflow: hidden;
}
.globe-mount { position: absolute; inset: 0; }
.globe-fade {
  position: absolute; left: 0; right: 0; bottom: 0; height: 56px;
  background: linear-gradient(180deg, transparent, var(--bg));
  pointer-events: none;
}
.globe-hud {
  position: absolute;
  top: 8px; left: 16px;
  display: flex; flex-direction: column; gap: 3px;
  font-size: 10px;
  color: var(--data);
  pointer-events: none;
  text-transform: uppercase;
  letter-spacing: .1em;
}
.hud-row { display: flex; gap: 6px; align-items: center; }
.hud-val { color: var(--amber); }
.globe-loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--mute); font-size: 12px; letter-spacing: .18em; text-transform: uppercase;
}

.filters {
  display: flex; gap: 8px;
  padding: 10px 16px 4px;
  overflow-x: auto;
  scrollbar-width: none;
  flex: none;
}
.filters::-webkit-scrollbar { display: none; }
.chip {
  flex: none;
  padding: 6px 13px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--bg-raise);
  color: var(--data);
  font-size: 12.5px;
  font-weight: 500;
  display: flex; align-items: center; gap: 6px;
  transition: background .15s, color .15s, border-color .15s;
  user-select: none;
  -webkit-user-select: none;
}
.chip.on {
  background: rgba(240,168,50,.12);
  border-color: var(--amber-dim);
  color: var(--amber);
}
.chip-n { font-size: 10.5px; color: var(--mute); }
.chip.on .chip-n { color: var(--amber-dim); }

.feed {
  flex: 1;
  overflow-y: auto;
  padding: 10px 16px calc(var(--safe-bottom) + 24px);
  -webkit-overflow-scrolling: touch;
}
.feed-state {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  padding: 48px 24px; text-align: center; color: var(--mute); font-size: 13.5px;
}
.retry-btn {
  padding: 9px 22px;
  border: 1px solid var(--amber-dim);
  border-radius: 10px;
  background: rgba(240,168,50,.1);
  color: var(--amber);
  font-size: 13.5px; font-weight: 600;
}
.skeleton {
  height: 92px; border-radius: 14px;
  background: linear-gradient(90deg, var(--bg-card) 25%, #131d31 50%, var(--bg-card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s linear infinite;
  margin-bottom: 10px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

.card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 12px 14px;
  margin-bottom: 10px;
  transition: border-color .15s, transform .12s;
}
.card:active { transform: scale(.985); border-color: var(--amber-dim); }
.card.hot { border-left: 2px solid var(--alert); }
.card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.src-badge {
  font-size: 10px; font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 2.5px 7px;
  border-radius: 5px;
  background: var(--bg-raise);
  border: 1px solid var(--line);
  color: var(--data);
}
.src-badge.tg { color: #55a8e0; border-color: rgba(85,168,224,.35); }
.src-badge.gdelt { color: var(--amber); border-color: rgba(240,168,50,.3); }
.src-badge.seismo { color: #c88fe0; border-color: rgba(200,143,224,.35); }
.card-time { font-size: 11px; color: var(--mute); margin-left: auto; }
.card-title { font-size: 14.5px; font-weight: 600; line-height: 1.38; }
.card-geo {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 7px;
  font-size: 11.5px;
  color: var(--data);
}
.geo-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--amber); flex: none; }
.card-geo.none .geo-dot { background: var(--mute); }
.card-geo.none { color: var(--mute); }

.sheet-veil {
  position: fixed; inset: 0;
  background: rgba(3,6,11,.6);
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  z-index: 40;
  opacity: 0;
  transition: opacity .22s;
}
.sheet-veil.show { opacity: 1; }
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  max-height: 78dvh;
  background: var(--bg-raise);
  border: 1px solid var(--line);
  border-bottom: none;
  border-radius: 20px 20px 0 0;
  padding: 10px 18px calc(var(--safe-bottom) + 20px);
  z-index: 41;
  transform: translate3d(0, 105%, 0);
  transition: transform .28s cubic-bezier(.32,.72,.28,1);
  display: flex; flex-direction: column;
  will-change: transform;
}
.sheet.show { transform: translate3d(0, 0, 0); }
.sheet-grip { width: 38px; height: 4px; border-radius: 2px; background: var(--line); margin: 0 auto 14px; flex: none; }
.sheet-body { overflow-y: auto; -webkit-overflow-scrolling: touch; }
.sheet-title { font-size: 17px; font-weight: 700; line-height: 1.35; margin-bottom: 10px; }
.sheet-text { font-size: 14.5px; color: var(--data); white-space: pre-wrap; word-break: break-word; }
.sheet-meta { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0 4px; }
.meta-pill {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 7px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  color: var(--mute);
}
.sheet-open {
  margin-top: 16px;
  display: block;
  text-align: center;
  padding: 12px;
  border-radius: 12px;
  background: rgba(240,168,50,.12);
  border: 1px solid var(--amber-dim);
  color: var(--amber);
  font-weight: 600;
  font-size: 14.5px;
  text-decoration: none;
}

@media (prefers-reduced-motion: reduce) {
  .pulse-dot, .skeleton { animation: none; }
  .sheet, .sheet-veil, .card { transition: none; }
}
</style>
</head>
<body>
<div class="shell" x-data="app" x-cloak>

  <header class="topbar">
    <div class="brand">
      <span class="brand-name">ORBITA</span>
      <span class="brand-tag">ситуационная картина</span>
    </div>
    <div class="sync-meta">
      <span class="mono" x-text="syncLabel"></span>
      <div class="pulse-dot" :class="{ stale: syncStale }"></div>
    </div>
  </header>

  <section class="globe-zone">
    <div class="globe-mount" x-ref="globeMount"></div>
    <div class="globe-loading" x-show="!globeReady">инициализация</div>
    <div class="globe-hud" x-show="globeReady">
      <div class="hud-row"><span>событий</span><span class="hud-val mono" x-text="visible.length"></span></div>
      <div class="hud-row"><span>с геопривязкой</span><span class="hud-val mono" x-text="geoCount"></span></div>
    </div>
    <div class="globe-fade"></div>
  </section>

  <nav class="filters">
    <template x-for="f in filterList" :key="f.key">
      <button class="chip" :class="{ on: activeFilter === f.key }" @click="setFilter(f.key)">
        <span x-text="f.label"></span>
        <span class="chip-n mono" x-text="countFor(f.key)"></span>
      </button>
    </template>
  </nav>

  <main class="feed" x-ref="feed">
    <template x-if="loading">
      <div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </template>

    <template x-if="!loading && error">
      <div class="feed-state">
        <span>Не удалось загрузить ленту. Проверьте связь и повторите.</span>
        <button class="retry-btn" @click="load()">Повторить</button>
      </div>
    </template>

    <template x-if="!loading && !error && visible.length === 0">
      <div class="feed-state">
        <span>По этому фильтру событий пока нет. Сборщик обновляет картину каждые 15 минут.</span>
      </div>
    </template>

    <template x-for="p in visible" :key="p.id">
      <article class="card" :class="{ hot: p.priority === 'high' }" @click="open(p)">
        <div class="card-head">
          <span class="src-badge" :class="badgeClass(p)" x-text="p.source_name"></span>
          <time class="card-time mono" x-text="ago(p.published_at)"></time>
        </div>
        <h2 class="card-title" x-text="p.title"></h2>
        <div class="card-geo" :class="{ none: !p.lat }">
          <span class="geo-dot"></span>
          <span x-text="p.place || 'без геопривязки'"></span>
        </div>
      </article>
    </template>
  </main>

  <div class="sheet-veil" x-show="detail" :class="{ show: sheetIn }" @click="close()" x-cloak></div>
  <div class="sheet" x-show="detail" :class="{ show: sheetIn }" x-cloak>
    <div class="sheet-grip"></div>
    <div class="sheet-body" x-show="detail">
      <h2 class="sheet-title" x-text="detail?.title"></h2>
      <p class="sheet-text" x-text="detail?.body || detail?.title"></p>
      <div class="sheet-meta">
        <span class="meta-pill" x-text="detail?.source_name"></span>
        <span class="meta-pill mono" x-text="detail ? fullDate(detail.published_at) : ''"></span>
        <template x-if="detail?.place">
          <span class="meta-pill" x-text="detail.place"></span>
        </template>
      </div>
      <template x-if="detail?.url">
        <a class="sheet-open" :href="detail.url" @click.prevent="openLink(detail.url)">Открыть источник</a>
      </template>
    </div>
  </div>

</div>

<script type="module">
import Alpine from 'alpinejs'
import Globe from 'globe.gl'
import { createClient } from '@supabase/supabase-js'

const tg = window.Telegram?.WebApp
tg?.ready()
tg?.expand()
tg?.disableVerticalSwipes?.()
tg?.setHeaderColor?.('#060a12')
tg?.setBackgroundColor?.('#060a12')

document.addEventListener('touchstart', () => {}, { passive: true })

if (!crypto.randomUUID) {
  crypto.randomUUID = () =>
    ([1e7] + -1e3 + -4e3 + -8e3 + -1e11).replace(/[018]/g, c =>
      (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16))
}

const CONFIG = {
  SUPABASE_URL: '',
  SUPABASE_ANON_KEY: '',
  REFRESH_MS: 90000,
  STALE_MS: 30 * 60 * 1000,
  FEED_LIMIT: 120
}

const supabase = CONFIG.SUPABASE_URL
  ? createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY)
  : null

function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))
  ])
}

const DEMO = [
  { id: '1', source_type: 'tg_channel', source_name: 'Мониторинг', title: 'Сейсмическая активность у побережья Хоккайдо, магнитуда 5.8', body: 'Толчки зафиксированы в 03:41 UTC на глубине 34 км. Предупреждение о цунами не объявлялось. Инфраструктурных повреждений не сообщается.', place: 'Хоккайдо, Япония', lat: 43.06, lon: 141.35, priority: 'high', published_at: Date.now() - 9 * 60000, url: 'https://t.me/s/example' },
  { id: '2', source_type: 'gdelt', source_name: 'GDELT', title: 'Массовые протесты в столичном регионе, перекрыты три магистрали', body: 'По оценкам агрегатора, охват события за последний час вырос втрое. Тональность освещения резко негативная.', place: 'Найроби, Кения', lat: -1.29, lon: 36.82, priority: 'high', published_at: Date.now() - 22 * 60000, url: '' },
  { id: '3', source_type: 'usgs', source_name: 'USGS', title: 'Землетрясение M4.6 в 40 км от Душанбе', body: 'Очаг на глубине 18 км. Ощущалось в жилых районах, данные о разрушениях уточняются.', place: 'Таджикистан', lat: 38.56, lon: 68.79, priority: 'normal', published_at: Date.now() - 48 * 60000, url: 'https://earthquake.usgs.gov' },
  { id: '4', source_type: 'tg_channel', source_name: 'Авиация', title: 'Закрыт воздушный коридор над северной частью Красного моря', body: 'NOTAM действует до 18:00 UTC. Перевозчики перестраивают маршруты через Египет.', place: 'Красное море', lat: 22.0, lon: 38.0, priority: 'normal', published_at: Date.now() - 75 * 60000, url: 'https://t.me/s/example' },
  { id: '5', source_type: 'firms', source_name: 'FIRMS', title: 'Кластер тепловых аномалий в промышленной зоне', body: 'Спутник VIIRS фиксирует устойчивый очаг в течение шести часов. Характер источника уточняется.', place: 'Роттердам, Нидерланды', lat: 51.92, lon: 4.48, priority: 'normal', published_at: Date.now() - 2.2 * 3600000, url: '' },
  { id: '6', source_type: 'rss', source_name: 'Reuters', title: 'Центробанк объявил внеплановое заседание по ставке', body: 'Решение ожидается в четверг. Рынки закладывают повышение на 50 б.п.', place: '', lat: null, lon: null, priority: 'normal', published_at: Date.now() - 3.1 * 3600000, url: 'https://reuters.com' },
  { id: '7', source_type: 'tg_channel', source_name: 'Регион', title: 'Отключения электроснабжения в трёх районах после шторма', body: 'Восстановительные работы ведут четыре бригады, срок — до конца суток.', place: 'Худжанд, Таджикистан', lat: 40.28, lon: 69.62, priority: 'normal', published_at: Date.now() - 5 * 3600000, url: 'https://t.me/s/example' }
]

Alpine.data('app', () => ({
  posts: [],
  loading: true,
  error: false,
  activeFilter: 'all',
  detail: null,
  sheetIn: false,
  globeReady: false,
  lastSync: null,
  now: Date.now(),
  _globe: null,
  _timer: null,
  _clock: null,
  _seq: 0,

  filterList: [
    { key: 'all', label: 'Все' },
    { key: 'hot', label: 'Срочное' },
    { key: 'tg_channel', label: 'Каналы' },
    { key: 'gdelt', label: 'GDELT' },
    { key: 'sensors', label: 'Датчики' },
    { key: 'rss', label: 'Пресса' }
  ],

  init() {
    this._clock = setInterval(() => { this.now = Date.now() }, 30000)
    this.load()
    this._timer = setInterval(() => this.load(true), CONFIG.REFRESH_MS)
    this.$nextTick(() => this.mountGlobe())
    this.$watch('visible', () => this.paintGlobe())
  },

  destroy() {
    clearInterval(this._timer)
    clearInterval(this._clock)
    this._globe?._destructor?.()
  },

  get visible() {
    if (this.activeFilter === 'all') return this.posts
    if (this.activeFilter === 'hot') return this.posts.filter(p => p.priority === 'high')
    if (this.activeFilter === 'sensors') return this.posts.filter(p => p.source_type === 'usgs' || p.source_type === 'firms')
    return this.posts.filter(p => p.source_type === this.activeFilter)
  },

  get geoCount() {
    return this.visible.filter(p => p.lat != null).length
  },

  get syncStale() {
    return !this.lastSync || (this.now - this.lastSync) > CONFIG.STALE_MS
  },

  get syncLabel() {
    if (!this.lastSync) return '—'
    const m = Math.floor((this.now - this.lastSync) / 60000)
    return m < 1 ? 'сейчас' : `${m} мин`
  },

  countFor(key) {
    if (key === 'all') return this.posts.length
    if (key === 'hot') return this.posts.filter(p => p.priority === 'high').length
    if (key === 'sensors') return this.posts.filter(p => p.source_type === 'usgs' || p.source_type === 'firms').length
    return this.posts.filter(p => p.source_type === key).length
  },

  async load(silent = false) {
    const seq = ++this._seq
    if (!silent) { this.loading = true; this.error = false }
    try {
      let rows
      if (supabase) {
        const { data, error } = await withTimeout(
          supabase.from('posts')
            .select('id, source_type, source_name, title, body, place, lat, lon, priority, published_at, url')
            .order('published_at', { ascending: false })
            .limit(CONFIG.FEED_LIMIT),
          12000
        )
        if (error) throw error
        rows = data.map(r => ({ ...r, published_at: new Date(r.published_at).getTime() }))
      } else {
        await new Promise(r => setTimeout(r, 500))
        rows = DEMO
      }
      if (seq !== this._seq) return
      this.posts = rows
      this.lastSync = Date.now()
      this.error = false
    } catch {
      if (seq !== this._seq) return
      if (!silent) this.error = true
    } finally {
      if (seq === this._seq) this.loading = false
    }
  },

  mountGlobe() {
    const el = this.$refs.globeMount
    const globe = Globe()(el)
      .width(el.clientWidth)
      .height(el.clientHeight)
      .backgroundColor('rgba(0,0,0,0)')
      .globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-night.jpg')
      .atmosphereColor('#2a4a7a')
      .atmosphereAltitude(0.18)
      .pointAltitude(0.015)
      .pointRadius(0.55)
      .pointColor(d => d.priority === 'high' ? '#e05252' : '#f0a832')
      .ringColor(d => d.priority === 'high'
        ? t => `rgba(224,82,82,${1 - t})`
        : t => `rgba(240,168,50,${(1 - t) * .7})`)
      .ringMaxRadius(d => d.priority === 'high' ? 5 : 3)
      .ringPropagationSpeed(1.4)
      .ringRepeatPeriod(1800)
      .onPointClick(d => {
        const p = this.posts.find(x => x.id === d.id)
        if (p) this.open(p)
      })
    globe.controls().autoRotate = true
    globe.controls().autoRotateSpeed = 0.45
    globe.controls().enableZoom = true
    globe.controls().minDistance = 180
    globe.controls().maxDistance = 420
    globe.pointOfView({ lat: 25, lng: 55, altitude: 2.1 }, 0)
    this._globe = globe
    this.globeReady = true
    this.paintGlobe()
    const ro = new ResizeObserver(() => {
      globe.width(el.clientWidth).height(el.clientHeight)
    })
    ro.observe(el)
  },

  paintGlobe() {
    if (!this._globe) return
    const pts = this.visible
      .filter(p => p.lat != null)
      .map(p => ({ id: p.id, lat: p.lat, lng: p.lon, priority: p.priority }))
    this._globe.pointsData(pts)
    this._globe.ringsData(pts.filter(p => p.priority === 'high'))
  },

  flyTo(p) {
    if (!this._globe || p.lat == null) return
    this._globe.controls().autoRotate = false
    this._globe.pointOfView({ lat: p.lat, lng: p.lon, altitude: 1.4 }, 800)
  },

  setFilter(key) {
    this.activeFilter = key
    tg?.HapticFeedback?.selectionChanged()
    this.$refs.feed.scrollTo({ top: 0, behavior: 'smooth' })
  },

  open(p) {
    this.detail = p
    this.flyTo(p)
    tg?.HapticFeedback?.impactOccurred('light')
    requestAnimationFrame(() => requestAnimationFrame(() => { this.sheetIn = true }))
  },

  close() {
    this.sheetIn = false
    setTimeout(() => {
      this.detail = null
      if (this._globe) this._globe.controls().autoRotate = true
    }, 300)
  },

  openLink(url) {
    if (url.startsWith('https://t.me/')) tg?.openTelegramLink?.(url)
    else tg?.openLink ? tg.openLink(url) : window.open(url, '_blank')
  },

  badgeClass(p) {
    if (p.source_type === 'tg_channel') return 'tg'
    if (p.source_type === 'gdelt') return 'gdelt'
    if (p.source_type === 'usgs' || p.source_type === 'firms') return 'seismo'
    return ''
  },

  ago(ts) {
    const d = this.now - ts
    if (d < 60000) return 'сейчас'
    if (d < 3600000) return `${Math.floor(d / 60000)} мин`
    if (d < 86400000) return `${Math.floor(d / 3600000)} ч`
    return `${Math.floor(d / 86400000)} д`
  },

  fullDate(ts) {
    return new Intl.DateTimeFormat('ru', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }).format(ts)
  }
}))

Alpine.start()
</script>
</body>
</html>
